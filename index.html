<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DuksNFT - Final Stable</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #ffffff; --text: #1c1c1e; --header-bg: #f2f2f7;
            --nav-bg: #e5e5ea; --accent: #007aff; --card: #ffffff;
            --common: #007aff; --epic: #af52de; --legendary: #ffcc00;
            --mythic: #ff3b30; --exclusive: linear-gradient(45deg, red, orange, yellow, green, blue, purple);
            --divine: #ffffff;
        }
        [data-theme="dark"] {
            --bg: #121212; --text: #ffffff; --header-bg: #1c1c1e; 
            --nav-bg: #2c2c2e; --accent: #0a84ff; --card: #252525;
            --divine: #eeeeee;
        }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        
        header { padding: 15px; background: var(--header-bg); border-bottom: 1px solid rgba(128,128,128,0.2); position: sticky; top: 0; z-index: 1000; }
        .user-bar { display: flex; align-items: center; gap: 12px; }
        .avatar-box { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); overflow: hidden; background: #333; cursor: pointer; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .stat-card { background: var(--nav-bg); padding: 8px; border-radius: 10px; font-size: 10px; text-align: center; font-weight: bold; }
        
        .balance { background: var(--accent); color: white; padding: 6px 15px; border-radius: 20px; font-weight: 800; }
        
        nav { display: flex; gap: 5px; margin-top: 10px; }
        .nav-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; background: var(--nav-bg); color: var(--text); font-weight: bold; cursor: pointer; font-size: 12px; }
        .nav-btn.active { background: var(--accent); color: white; }

        /* Модальные окна и уведомления */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); padding: 25px; border-radius: 24px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal input, .modal select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(128,128,128,0.3); background: var(--bg); color: var(--text); box-sizing: border-box; }
        
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 12px 25px; border-radius: 25px; font-weight: bold; font-size: 14px; z-index: 3000; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* Игровые экраны */
        .screen { display: none; padding: 20px; animation: slideUp 0.3s ease-out; }
        .screen.active { display: block; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .case-card { background: var(--card); padding: 25px; border-radius: 24px; margin-bottom: 15px; border: 1px solid rgba(128,128,128,0.1); text-align: center; }
        .case-icon { font-size: 60px; margin-bottom: 15px; display: block; }
        .shaking { animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(5deg); } 75% { transform: rotate(-5deg); } }

        /* Предметы */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item { background: var(--card); border-radius: 20px; padding: 15px; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(128,128,128,0.1); min-height: 120px; justify-content: center; }
        
        .item-glow { position: absolute; width: 80px; height: 80px; filter: blur(25px); border-radius: 50%; opacity: 0.5; z-index: 0; pointer-events: none; }
        .glow-exclusive { animation: rainbowGlow 3s linear infinite; opacity: 0.7; }
        @keyframes rainbowGlow { 0% { background: red; } 33% { background: yellow; } 66% { background: blue; } 100% { background: red; } }

        .sell-btn { z-index: 2; width: 100%; margin-top: 10px; border: 1px solid #ff3b30; color: #ff3b30; background: none; border-radius: 10px; font-size: 11px; font-weight: 800; padding: 6px; cursor: pointer; }

        .admin-zone { display: none; background: #fff3cd; padding: 15px; border-radius: 18px; margin-top: 15px; border: 2px solid #ffeeba; color: #856404; text-align: left; }
    </style>
</head>
<body data-theme="light">

<header>
    <div class="user-bar">
        <div class="avatar-box" onclick="document.getElementById('file-up').click()">
            <img id="u-av" src="https://via.placeholder.com/100" alt="">
        </div>
        <input type="file" id="file-up" hidden accept="image/*" onchange="handleAv(event)">
        <div style="flex:1">
            <div id="u-nick" style="font-weight:900; font-size:18px;" onclick="openNickModal()">Загрузка...</div>
            <div id="u-lvl" style="font-size:11px; opacity:0.6;">Уровень 1</div>
        </div>
        <div class="balance"><span id="u-bal">0</span> D</div>
    </div>
    <div class="stats-grid">
        <div class="stat-card">Инвентарь: <br><span id="s-worth">0</span> D</div>
        <div class="stat-card">Предметов: <br><span id="s-cnt">0</span></div>
    </div>
    <nav>
        <button class="nav-btn active" id="btn-c" onclick="show('cases', 'btn-c')">Кейсы</button>
        <button class="nav-btn" id="btn-i" onclick="show('inv', 'btn-i')">Инвентарь</button>
        <button class="nav-btn" id="btn-s" onclick="handleAdminLogic()">⚙️</button>
    </nav>
</header>

<main>
    <div id="cases" class="screen active"></div>
    <div id="inv" class="screen"><div class="grid" id="inv-grid"></div></div>
    
    <div id="settings" class="screen">
        <h2>Настройки</h2>
        <button class="nav-btn" onclick="switchTheme()" style="width:100%; margin-bottom:12px; padding: 15px;">Сменить тему</button>
        <button class="nav-btn" id="log-in" onclick="login()" style="width:100%; background:white; color:black; border:1px solid #ccc;">Войти через Google</button>
        <button class="nav-btn" id="log-out" onclick="logout()" style="display:none; width:100%; background:#ff3b30; color:white;">Выйти</button>

        <div id="adm-menu" class="admin-zone">
            <b>🛠 АДМИН-ПАНЕЛЬ</b>
            <input type="number" id="adm-money" placeholder="+ Duks">
            <input type="number" id="adm-xp" placeholder="+ XP">
            <select id="adm-items"></select>
            <button class="nav-btn" onclick="admGive(true)" style="width:100%; background:#28a745; color:white; margin:5px 0;">Себе</button>
            <hr>
            <input type="text" id="adm-user" placeholder="Ник игрока">
            <button class="nav-btn" onclick="admGive(false)" style="width:100%; background:#007aff; color:white;">Выдать игроку</button>
        </div>
    </div>
</main>

<div id="modal-nick" class="modal">
    <div class="modal-content">
        <h3>Новый ник</h3>
        <input type="text" id="nick-input" maxlength="12" placeholder="Введите имя...">
        <button class="nav-btn" style="background:var(--accent); color:white; width:100%;" onclick="saveNick()">Сохранить</button>
        <button class="nav-btn" style="width:100%; margin-top:8px;" onclick="closeModals()">Отмена</button>
    </div>
</div>

<div id="toast" class="toast">Уведомление</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDno2jAXYzNc8EN3pkYbrhwkJ5v4aVBxH8",
        authDomain: "duksnft.firebaseapp.com",
        projectId: "duksnft",
        storageBucket: "duksnft.firebasestorage.app",
        messagingSenderId: "774746155070",
        appId: "1:774746155070:web:8e9718290ea579ffd8096f"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ITEMS = [
        { n: "Перо", sell: 150, r: "common", i: "🪶", chance: 33 },
        { n: "Урна", sell: 150, r: "common", i: "⚱️", chance: 33 },
        { n: "Старый ботинок", sell: 150, r: "common", i: "👞", chance: 33 },
        { n: "Золотой слиток", sell: 1000, r: "legendary", i: "🧈", chance: 1 },
        { n: "Эспандер", sell: 1500, r: "mythic", i: "💪", chance: 50 },
        { n: "Золотой эспандер", sell: 2000, r: "mythic", i: "💪✨", chance: 20 },
        { n: "Алмазный эспандер", sell: 1500, r: "mythic", i: "💪💎", chance: 10 },
        { n: "Божественный эспандер", sell: 10000, r: "exclusive", i: "☄️", chance: 1 },
        { n: "Золотой кубок", sell: 15000, r: "legendary", i: "🏆", chance: 5 },
        { n: "Мешок денег", sell: 5000, r: "exclusive", i: "💰", chance: 10 },
        { n: "Телефон", sell: 3000, r: "epic", i: "📱", chance: 15 },
        { n: "Корона Создателя", sell: 50000, r: "divine", i: "👑", chance: 0 }
    ];

    const CASE_LIST = [
        { name: "Бедный", price: 200, icon: "📦", pool: [0,1,2,3] },
        { name: "Мощный", price: 2000, icon: "⚡", pool: [4,5,6,7] },
        { name: "@#₽#37₽", price: 5000, icon: "🏷️", pool: [8,9,10,11] }
    ];

    let pData = { b: 1000, inv: [], xp: 0, nick: "Игрок", av: "" };
    let aClick = 0;

    // Инициализация темы ПЕРЕД загрузкой контента
    const savedTheme = localStorage.getItem('game-theme') || 'light';
    document.body.setAttribute('data-theme', savedTheme);

    async function init() {
        auth.onAuthStateChanged(async (u) => {
            if (u) {
                document.getElementById('log-in').style.display = 'none';
                document.getElementById('log-out').style.display = 'block';
                await loadData(u.uid);
            }
            update();
        });

        const sel = document.getElementById('adm-items');
        ITEMS.forEach((it, i) => sel.innerHTML += `<option value="${i}">${it.i} ${it.n}</option>`);
        renderCases();
    }

    async function loadData(uid) {
        const doc = await db.collection("users").doc(uid).get();
        if (doc.exists) pData = {...pData, ...doc.data()};
        else await db.collection("users").doc(uid).set(pData);
    }

    async function sync() {
        update();
        if (auth.currentUser) await db.collection("users").doc(auth.currentUser.uid).set(pData, { merge: true });
    }

    function update() {
        document.getElementById('u-bal').innerText = pData.b.toLocaleString();
        document.getElementById('u-nick').innerText = pData.nick;
        if(pData.av) document.getElementById('u-av').src = pData.av;
        
        const lvl = Math.floor(Math.sqrt(pData.xp / 100)) + 1;
        document.getElementById('u-lvl').innerText = `Уровень ${lvl} (${pData.xp} XP)`;

        let worth = 0;
        const g = document.getElementById('inv-grid');
        g.innerHTML = pData.inv.length ? '' : '<p style="grid-column:1/-1; opacity:0.3; margin-top:40px;">Пусто</p>';
        
        pData.inv.forEach((it, i) => {
            worth += it.sell;
            const isEx = it.r === 'exclusive';
            const glowClass = isEx ? 'item-glow glow-exclusive' : 'item-glow';
            const glowStyle = isEx ? '' : `background: var(--${it.r})`;

            g.innerHTML += `<div class="item">
                <div class="${glowClass}" style="${glowStyle}"></div>
                <div style="font-size:35px; z-index:1;">${it.i}</div>
                <button class="sell-btn" onclick="sell(${i})">${it.sell} D</button>
            </div>`;
        });
        document.getElementById('s-worth').innerText = worth.toLocaleString();
        document.getElementById('s-cnt').innerText = pData.inv.length;
    }

    function renderCases() {
        document.getElementById('cases').innerHTML = CASE_LIST.map((c, i) => `
            <div class="case-card">
                <span class="case-icon" id="case-ico-${i}">${c.icon}</span>
                <h3 style="margin:0;">${c.name}</h3>
                <button class="nav-btn" style="background:#34c759; color:white; width:100%; margin-top:15px; font-size:16px;" onclick="openCase(${i})">${c.price} Duks</button>
            </div>`).join('');
    }

    function openCase(i) {
        if (pData.b < CASE_LIST[i].price) return msg("Недостаточно Duks!");
        pData.b -= CASE_LIST[i].price;
        
        const ico = document.getElementById(`case-ico-${i}`);
        ico.classList.add('shaking');
        
        setTimeout(() => {
            const pool = [];
            CASE_LIST[i].pool.forEach(idx => { for(let k=0; k<ITEMS[idx].chance; k++) pool.push(ITEMS[idx]); });
            const win = {...pool[Math.floor(Math.random()*pool.length)]};
            pData.inv.push(win);
            pData.xp += 25;
            ico.classList.remove('shaking');
            sync();
            msg(`Выпало: ${win.n}!`);
        }, 600);
    }

    function sell(i) { 
        pData.b += pData.inv[i].sell; 
        pData.inv.splice(i, 1); 
        sync(); 
    }

    function handleAv(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onloadend = () => { pData.av = reader.result; sync(); msg("Аватар обновлен!"); };
        if(file) reader.readAsDataURL(file);
    }

    function openNickModal() { document.getElementById('modal-nick').style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function saveNick() {
        const n = document.getElementById('nick-input').value.trim();
        if(n) { pData.nick = n; sync(); closeModals(); msg("Ник изменен!"); }
    }

    function switchTheme() {
        const cur = document.body.getAttribute('data-theme');
        const next = cur === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
        localStorage.setItem('game-theme', next);
    }

    function handleAdminLogic() {
        show('settings', 'btn-s');
        aClick++;
        if(aClick >= 5) {
            const code = prompt("Admin Code:");
            if(code === "Zxc1234Zxc") document.getElementById('adm-menu').style.display = 'block';
            aClick = 0;
        }
    }

    async function admGive(self) {
        const d = parseInt(document.getElementById('adm-money').value || 0);
        const x = parseInt(document.getElementById('adm-xp').value || 0);
        const it = ITEMS[document.getElementById('adm-items').value];

        if(self) {
            pData.b += d; pData.xp += x; pData.inv.push({...it}); sync();
            msg("Выдано себе!");
        } else {
            const userNick = document.getElementById('adm-user').value;
            const snap = await db.collection("users").where("nick", "==", userNick).get();
            if(!snap.empty) {
                const docRef = db.collection("users").doc(snap.docs[0].id);
                const data = snap.docs[0].data();
                data.b = (data.b || 0) + d;
                data.xp = (data.xp || 0) + x;
                data.inv = data.inv || [];
                data.inv.push({...it});
                await docRef.set(data, { merge: true });
                msg("Отправлено игроку " + userNick);
            } else msg("Игрок не найден!");
        }
    }

    function msg(t) {
        const toast = document.getElementById('toast');
        toast.innerText = t;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    function show(id, bid) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(bid).classList.add('active');
    }

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }

    init();
</script>
</body>
</html>
