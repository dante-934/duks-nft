<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DuksNFT - Final Fix</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #ffffff; --text: #1c1c1e; --header-bg: #f2f2f7;
            --nav-bg: #e5e5ea; --accent: #007aff; --card: #ffffff;
            --common: #007aff; --epic: #af52de; --legendary: #ffcc00;
            --mythic: #ff3b30; --exclusive: linear-gradient(45deg, red, orange, yellow, green, blue, purple);
            --divine: #ffffff;
        }
        [data-theme="dark"] {
            --bg: #121212; --text: #ffffff; --header-bg: #1c1c1e; 
            --nav-bg: #2c2c2e; --accent: #0a84ff; --card: #252525;
        }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        
        header { padding: 15px; background: var(--header-bg); border-bottom: 1px solid rgba(128,128,128,0.2); position: sticky; top: 0; z-index: 1000; }
        .user-bar { display: flex; align-items: center; gap: 12px; }
        .avatar-box { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); overflow: hidden; background: #333; cursor: pointer; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .balance { background: var(--accent); color: white; padding: 6px 15px; border-radius: 20px; font-weight: 800; font-size: 14px; }
        
        nav { display: flex; gap: 5px; margin-top: 10px; }
        .nav-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; background: var(--nav-bg); color: var(--text); font-weight: bold; cursor: pointer; font-size: 12px; }
        .nav-btn.active { background: var(--accent); color: white; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: var(--card); padding: 25px; border-radius: 28px; width: 85%; max-width: 320px; text-align: center; }
        .modal input, .modal select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(128,128,128,0.3); background: var(--bg); color: var(--text); box-sizing: border-box; }
        
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 3000; display: none; text-align: center; }

        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item { background: var(--card); border-radius: 22px; padding: 15px; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(128,128,128,0.15); min-height: 110px; justify-content: center; }
        .item-glow { position: absolute; width: 70px; height: 70px; filter: blur(25px); border-radius: 50%; opacity: 0.5; z-index: 0; }
        .glow-exclusive { animation: rb 3s linear infinite; }
        @keyframes rb { 0% { background: red; } 33% { background: yellow; } 66% { background: blue; } 100% { background: red; } }

        .admin-section { background: #fff3cd; color: #856404; padding: 15px; border-radius: 18px; margin-top: 15px; border: 2px solid #ffeeba; display: none; text-align: left; }
    </style>
</head>
<body data-theme="light">

<header>
    <div class="user-bar">
        <div class="avatar-box" onclick="document.getElementById('file-up').click()">
            <img id="u-av" src="https://via.placeholder.com/100" alt="">
        </div>
        <input type="file" id="file-up" hidden accept="image/*" onchange="handleAv(event)">
        <div style="flex:1">
            <div id="u-nick" style="font-weight:900; font-size:18px; color:var(--accent);" onclick="openNickModal()">Загрузка...</div>
            <div id="u-lvl" style="font-size:11px; opacity:0.6;">Уровень 1</div>
        </div>
        <div class="balance"><span id="u-bal">0</span> D</div>
    </div>
    <nav>
        <button class="nav-btn active" id="btn-c" onclick="show('cases', 'btn-c')">Кейсы</button>
        <button class="nav-btn" id="btn-i" onclick="show('inv', 'btn-i')">Сумка</button>
        <button class="nav-btn" id="btn-s" onclick="triggerAdmin()">⚙️</button>
    </nav>
</header>

<main>
    <div id="cases" class="screen active"></div>
    <div id="inv" class="screen"><div class="grid" id="inv-grid"></div></div>
    
    <div id="settings" class="screen">
        <h3>Настройки</h3>
        <button class="nav-btn" onclick="switchTheme()" style="width:100%; margin-bottom:10px; height:50px;">Сменить тему</button>
        <button class="nav-btn" id="log-in" onclick="login()" style="width:100%; background:#fff; color:#000; border:1px solid #ddd;">Войти Google</button>
        <button class="nav-btn" id="log-out" onclick="logout()" style="display:none; width:100%; background:#ff3b30; color:white;">Выйти</button>

        <div id="adm-ui" class="admin-section">
            <b>🛠 ПАНЕЛЬ РАЗРАБОТЧИКА</b>
            <input type="number" id="adm-money" placeholder="+ Duks">
            <input type="number" id="adm-xp" placeholder="+ XP">
            <select id="adm-items"></select>
            <button class="nav-btn" onclick="admAction(true)" style="width:100%; background:#28a745; color:white;">Себе</button>
            <hr style="border:0; border-top:1px solid #ffeeba; margin:10px 0;">
            <input type="text" id="adm-user" placeholder="Ник игрока (точно)">
            <button class="nav-btn" onclick="admAction(false)" style="width:100%; background:#007aff; color:white;">Выдать игроку</button>
        </div>
    </div>
</main>

<div id="modal-nick" class="modal">
    <div class="modal-content">
        <h3>Смена ника</h3>
        <input type="text" id="nick-field" maxlength="12" placeholder="Новый ник">
        <button class="nav-btn" style="background:var(--accent); color:white; width:100%;" onclick="saveNick()">Сохранить</button>
        <button class="nav-btn" style="width:100%; margin-top:8px;" onclick="closeAll()">Закрыть</button>
    </div>
</div>

<div id="modal-admin" class="modal">
    <div class="modal-content">
        <h3>Админ-доступ</h3>
        <input type="password" id="adm-pass" placeholder="Код">
        <button class="nav-btn" style="background:var(--accent); color:white; width:100%;" onclick="checkAdm()">ОК</button>
        <button class="nav-btn" style="width:100%; margin-top:8px;" onclick="closeAll()">Отмена</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDno2jAXYzNc8EN3pkYbrhwkJ5v4aVBxH8",
        authDomain: "duksnft.firebaseapp.com",
        projectId: "duksnft",
        storageBucket: "duksnft.firebasestorage.app",
        messagingSenderId: "774746155070",
        appId: "1:774746155070:web:8e9718290ea579ffd8096f"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ITEMS = [
        { n: "Перо", sell: 150, r: "common", i: "🪶", chance: 33 },
        { n: "Урна", sell: 150, r: "common", i: "⚱️", chance: 33 },
        { n: "Старый ботинок", sell: 150, r: "common", i: "👞", chance: 33 },
        { n: "Золотой слиток", sell: 1000, r: "legendary", i: "🧈", chance: 1 },
        { n: "Эспандер", sell: 1500, r: "mythic", i: "💪", chance: 50 },
        { n: "Золотой эспандер", sell: 2000, r: "mythic", i: "💪✨", chance: 20 },
        { n: "Алмазный эспандер", sell: 1500, r: "mythic", i: "💪💎", chance: 10 },
        { n: "Божественный эспандер", sell: 10000, r: "exclusive", i: "☄️", chance: 1 },
        { n: "Золотой кубок", sell: 15000, r: "legendary", i: "🏆", chance: 5 },
        { n: "Мешок денег", sell: 5000, r: "exclusive", i: "💰", chance: 10 },
        { n: "Телефон", sell: 3000, r: "epic", i: "📱", chance: 15 },
        { n: "Корона Создателя", sell: 50000, r: "divine", i: "👑", chance: 0 }
    ];

    const CASES = [
        { name: "Бедный", p: 200, icon: "📦", pool: [0,1,2,3] },
        { name: "Мощный", p: 2000, icon: "⚡", pool: [4,5,6,7] },
        { name: "Элитный", p: 5000, icon: "🏷️", pool: [8,9,10,11] }
    ];

    let pData = { b: 1000, inv: [], xp: 0, nick: "Игрок", av: "" };
    let aStep = 0;

    const savedTheme = localStorage.getItem('theme-store') || 'light';
    document.body.setAttribute('data-theme', savedTheme);

    async function init() {
        auth.onAuthStateChanged(async (u) => {
            if (u) {
                document.getElementById('log-in').style.display = 'none';
                document.getElementById('log-out').style.display = 'block';
                await loadData(u.uid);
            }
            update();
        });
        const s = document.getElementById('adm-items');
        ITEMS.forEach((it, i) => s.innerHTML += `<option value="${i}">${it.i} ${it.n}</option>`);
        renderCases();
    }

    async function loadData(uid) {
        const d = await db.collection("users").doc(uid).get();
        if (d.exists) pData = {...pData, ...d.data()};
        else await db.collection("users").doc(uid).set(pData);
    }

    async function sync() {
        update();
        if (auth.currentUser) await db.collection("users").doc(auth.currentUser.uid).set(pData, { merge: true });
    }

    function update() {
        document.getElementById('u-bal').innerText = pData.b.toLocaleString();
        document.getElementById('u-nick').innerText = pData.nick;
        if(pData.av) document.getElementById('u-av').src = pData.av;
        const lvl = Math.floor(Math.sqrt(pData.xp / 100)) + 1;
        document.getElementById('u-lvl').innerText = `Уровень ${lvl} (${pData.xp} XP)`;
        const g = document.getElementById('inv-grid');
        g.innerHTML = pData.inv.length ? '' : '<p style="grid-column:1/-1; opacity:0.3; margin-top:40px;">Сумка пуста</p>';
        pData.inv.forEach((it, i) => {
            const isEx = it.r === 'exclusive';
            g.innerHTML += `<div class="item">
                <div class="item-glow ${isEx?'glow-exclusive':''}" style="${isEx?'':'background:var(--'+it.r+')'}"></div>
                <div style="font-size:35px; z-index:1;">${it.i}</div>
                <button class="sell-btn" style="z-index:2; margin-top:10px; border:1px solid #ff3b30; color:#ff3b30; background:none; padding:5px; border-radius:8px; font-size:10px;" onclick="sell(${i})">${it.sell} D</button>
            </div>`;
        });
    }

    function renderCases() {
        document.getElementById('cases').innerHTML = CASES.map((c, i) => `
            <div style="background:var(--card); padding:20px; border-radius:24px; margin-bottom:15px; border:1px solid rgba(128,128,128,0.1); text-align:center;">
                <span style="font-size:50px; display:block;" id="c-ico-${i}">${c.icon}</span>
                <h3 style="margin:10px 0;">${c.name}</h3>
                <button class="nav-btn" style="background:#34c759; color:white; width:100%;" onclick="openCase(${i})">${c.p} Duks</button>
            </div>`).join('');
    }

    function openCase(i) {
        if (pData.b < CASES[i].p) return msg("Недостаточно Duks!");
        pData.b -= CASES[i].p;
        const ico = document.getElementById(`c-ico-${i}`);
        ico.style.transform = "scale(1.2)";
        setTimeout(() => {
            const pool = [];
            CASES[i].pool.forEach(idx => { for(let k=0; k<ITEMS[idx].chance; k++) pool.push(ITEMS[idx]); });
            const win = {...pool[Math.floor(Math.random()*pool.length)]};
            pData.inv.push(win); pData.xp += 25;
            ico.style.transform = "scale(1)";
            sync();
            msg("Выпало: " + win.n);
        }, 400);
    }

    function sell(i) { pData.b += pData.inv[i].sell; pData.inv.splice(i, 1); sync(); }

    function handleAv(e) {
        const f = e.target.files[0];
        const r = new FileReader();
        r.onloadend = () => { pData.av = r.result; sync(); msg("Аватар обновлен!"); };
        if(f) r.readAsDataURL(f);
    }

    function openNickModal() { document.getElementById('modal-nick').style.display = 'flex'; }
    function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    async function saveNick() {
        const val = document.getElementById('nick-field').value.trim();
        if(!val || val === pData.nick) return closeAll();
        const snap = await db.collection("users").where("nick", "==", val).get();
        if(!snap.empty) return msg("Ник занят!");
        pData.nick = val;
        await sync(); closeAll(); msg("Ник изменен!");
    }

    function triggerAdmin() {
        show('settings', 'btn-s');
        aStep++;
        if(aStep >= 5) { document.getElementById('modal-admin').style.display = 'flex'; aStep = 0; }
    }

    function checkAdm() {
        if(document.getElementById('adm-pass').value === "Zxc1234Zxc") {
            document.getElementById('adm-ui').style.display = 'block';
            closeAll(); msg("Разработчик в сети");
        } else msg("Ошибка");
    }

    async function admAction(self) {
        const d = parseInt(document.getElementById('adm-money').value || 0);
        const x = parseInt(document.getElementById('adm-xp').value || 0);
        const it = ITEMS[document.getElementById('adm-items').value];

        if(self) {
            pData.b += d; pData.xp += x; pData.inv.push({...it}); sync();
            msg("Получено!");
        } else {
            const target = document.getElementById('adm-user').value.trim();
            if(!target) return msg("Введите ник!");
            
            const snap = await db.collection("users").where("nick", "==", target).get();
            if(!snap.empty) {
                const docId = snap.docs[0].id;
                const remote = snap.docs[0].data();
                
                // Исправленная логика выдачи
                const updatedData = {
                    b: (remote.b || 0) + d,
                    xp: (remote.xp || 0) + x,
                    inv: remote.inv || []
                };
                updatedData.inv.push({...it});

                await db.collection("users").doc(docId).set(updatedData, { merge: true });
                msg("Отправлено игроку " + target);
            } else {
                msg("Игрок не найден!");
            }
        }
    }

    function msg(t) {
        const toast = document.getElementById('toast');
        toast.innerText = t; toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2500);
    }

    function switchTheme() {
        const cur = document.body.getAttribute('data-theme');
        const next = cur === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
        localStorage.setItem('theme-store', next);
    }

    function show(id, bid) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(bid).classList.add('active');
    }

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }

    init();
</script>
</body>
</html>
