<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DuksNFT - Secure Admin</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #ffffff; --text: #1c1c1e; --header-bg: #f2f2f7;
            --nav-bg: #e5e5ea; --accent: #007aff;
            --common: rgba(0, 122, 255, 0.5); --epic: #af52de; 
            --legendary: #ffcc00; --mythic: #ff3b30;
        }
        [data-theme="dark"] {
            --bg: #000000; --text: #ffffff; --header-bg: #1c1c1e; --nav-bg: #2c2c2e; --accent: #0a84ff;
        }

        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; user-select: none; }
        
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .google-btn { display: flex; align-items: center; gap: 12px; background: white; border: 1px solid #dadce0; padding: 14px 28px; border-radius: 28px; font-weight: 600; cursor: pointer; }

        header { padding: 15px; background: var(--header-bg); border-bottom: 1px solid rgba(128,128,128,0.2); position: sticky; top: 0; z-index: 1000; }
        .balance { background: var(--accent); color: white; padding: 6px 14px; border-radius: 20px; font-weight: 800; }

        nav { display: flex; gap: 8px; margin-top: 10px; }
        .nav-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; background: var(--nav-bg); color: var(--text); font-weight: 700; font-size: 12px; cursor: pointer; }
        .nav-btn.active { background: var(--accent); color: white; }

        .screen { display: none; padding: 20px; text-align: center; }
        .screen.active { display: block; }

        .case-box { background: var(--header-bg); padding: 25px; border-radius: 24px; margin-bottom: 20px; border: 1px solid rgba(128,128,128,0.1); }
        .open-button { width: 100%; padding: 16px; background: #34c759; color: white; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item { background: var(--header-bg); padding: 15px; border-radius: 18px; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; min-height: 110px; justify-content: center; border: 1px solid rgba(128,128,128,0.1); }
        
        .glow { position: absolute; width: 60px; height: 60px; filter: blur(20px); border-radius: 50%; opacity: 0.5; z-index: 0; pointer-events: none; }
        .glow-rainbow { animation: rainbow 3s linear infinite; }
        @keyframes rainbow { 0% { background: red; } 33% { background: yellow; } 66% { background: blue; } 100% { background: red; } }
        
        .sell-btn { z-index: 2; margin-top: 10px; width: 100%; border: 1px solid #ff3b30; color: #ff3b30; background: transparent; padding: 6px; border-radius: 10px; font-size: 10px; font-weight: 800; cursor: pointer; }

        /* Стили для админ-панели */
        #admin-auth-box { margin-top: 20px; padding: 15px; border: 1px dashed var(--accent); border-radius: 15px; display: none; }
        #admin-input { width: 80%; padding: 10px; border-radius: 10px; border: 1px solid var(--nav-bg); background: var(--bg); color: var(--text); text-align: center; margin-bottom: 10px; }
        #admin-menu { display: none; background: #fff3cd; color: #856404; padding: 15px; border-radius: 15px; margin-top: 15px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div style="font-size: 60px; margin-bottom: 10px;">🦆</div>
    <h1>DuksNFT</h1>
    <p id="auth-status">Инициализация...</p>
    <button class="google-btn" id="login-btn" style="display:none;" onclick="googleLogin()">Войти через Google</button>
</div>

<header id="main-header" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-weight:900; font-size:22px; color:var(--accent);">DuksNFT</div>
        <div class="balance"><span id="b-val">0</span> D</div>
    </div>
    <nav>
        <button class="nav-btn active" id="btn-cases" onclick="show('cases', 'btn-cases')">Кейсы</button>
        <button class="nav-btn" id="btn-inv" onclick="show('inventory', 'btn-inv')">Инвентарь</button>
        <button class="nav-btn" onclick="handleSettings()">⚙️</button>
    </nav>
</header>

<main id="main-content" style="display:none;">
    <div id="cases" class="screen active"></div>
    <div id="inventory" class="screen"><div class="grid" id="inv-g"></div></div>
    
    <div id="settings" class="screen">
        <p id="user-info" style="font-size:12px; opacity:0.6;"></p>
        <button class="nav-btn" onclick="signOut()" style="background:#ff3b30; color:white; width:100%;">Выйти</button>

        <div id="admin-auth-box">
            <input type="password" id="admin-input" placeholder="Введите код доступа">
            <button class="nav-btn" onclick="checkAdminCode()" style="background:var(--accent); color:white; width:100%;">Активировать</button>
        </div>

        <div id="admin-menu">
            <b>Admin Mode Active</b><br><br>
            <button onclick="addM(1000000)" class="nav-btn" style="width:100%; background:#28a745; color:white;">+1M Duks</button>
        </div>
    </div>
</main>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDno2jAXYzNc8EN3pkYbrhwkJ5v4aVBxH8",
        authDomain: "duksnft.firebaseapp.com",
        projectId: "duksnft",
        storageBucket: "duksnft.firebasestorage.app",
        messagingSenderId: "774746155070",
        appId: "1:774746155070:web:8e9718290ea579ffd8096f"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const CONFIG = [
        { name: "Бедный", price: 200, icon: "📦", items: [
            { n: "Перо", sell: 150, c: "var(--common)", i: "🪶" },
            { n: "Урна", sell: 195, c: "var(--epic)", i: "⚱️" }
        ]},
        { name: "Мощный", price: 2000, icon: "⚡", items: [
            { n: "Эспандер", sell: 5000, c: "var(--mythic)", i: "💪" },
            { n: "Золотой эспандер", sell: 6000, c: "var(--legendary)", i: "💪✨" }
        ]},
        { name: "Эксклюзив", price: 15000, icon: "✨", items: [
            { n: "Луна", sell: 10000, c: "rainbow", i: "🌙" },
            { n: "Солнце", sell: 10000, c: "rainbow", i: "☀️" }
        ]}
    ];

    let b = 1000;
    let inv = [];
    let isLoaded = false;
    let settingClicks = 0;

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            await load(user);
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('login-btn').style.display = 'flex';
            document.getElementById('auth-status').innerText = "Войдите для игры";
        }
    });

    async function load(user) {
        try {
            const doc = await db.collection("users").doc(user.uid).get();
            if (doc.exists) {
                b = doc.data().balance ?? 1000;
                inv = doc.data().inventory ?? [];
            } else {
                await db.collection("users").doc(user.uid).set({ balance: 1000, inventory: [] });
            }
            isLoaded = true;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-header').style.display = 'block';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('user-info').innerText = user.email;
            sync(false);
            renderCases();
        } catch (e) { console.error(e); }
    }

    async function sync(save = true) {
        if (!isLoaded) return;
        document.getElementById('b-val').innerText = b.toLocaleString();
        renderInv();
        if (save && auth.currentUser) {
            await db.collection("users").doc(auth.currentUser.uid).set({ balance: b, inventory: inv }, { merge: true });
        }
    }

    function renderInv() {
        const g = document.getElementById('inv-g');
        g.innerHTML = inv.length ? '' : '<p style="grid-column:1/-1; opacity:0.5;">Инвентарь пуст</p>';
        inv.forEach((it, idx) => {
            g.innerHTML += `
                <div class="item">
                    <div class="glow ${it.c === 'rainbow' ? 'glow-rainbow' : ''}" style="background:${it.c === 'rainbow' ? '' : it.c}"></div>
                    <div style="font-size:35px; z-index:1;">${it.i}</div>
                    <div style="font-size:10px; font-weight:800; z-index:1; margin-top:5px;">${it.n}</div>
                    <button class="sell-btn" onclick="sell(${idx})">${it.sell} D</button>
                </div>`;
        });
    }

    function renderCases() {
        document.getElementById('cases').innerHTML = CONFIG.map((c, i) => `
            <div class="case-box">
                <div style="font-size:50px;">${c.icon}</div>
                <h2>${c.name}</h2>
                <button class="open-button" onclick="openC(${i})">${c.price} Duks</button>
            </div>`).join('');
    }

    function openC(i) {
        if (!isLoaded || b < CONFIG[i].price) return b < CONFIG[i].price ? alert('Мало денег!') : null;
        b -= CONFIG[i].price;
        inv.push({...CONFIG[i].items[Math.floor(Math.random() * CONFIG[i].items.length)]});
        sync();
    }

    function sell(idx) { b += inv[idx].sell; inv.splice(idx, 1); sync(); }
    
    function show(id, btnId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btnId) document.getElementById(btnId).classList.add('active');
        if (id !== 'settings') settingClicks = 0; // Сброс кликов если ушли из настроек
    }

    // ЛОГИКА АДМИН ПАНЕЛИ
    function handleSettings() {
        settingClicks++;
        show('settings');
        // Показываем поле ввода после 5 кликов
        if (settingClicks >= 5) {
            document.getElementById('admin-auth-box').style.display = 'block';
        }
    }

    function checkAdminCode() {
        const input = document.getElementById('admin-input').value;
        if (input === "Zxc1234Zxc") {
            document.getElementById('admin-menu').style.display = 'block';
            document.getElementById('admin-auth-box').style.display = 'none';
            alert("Админ-режим активирован!");
        } else {
            alert("Неверный код доступа!");
        }
    }

    function googleLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithRedirect(provider);
    }

    function signOut() { auth.signOut().then(() => location.reload()); }
    function addM(v) { b += v; sync(); }
</script>
</body>
</html>
