<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, landscape=true">
    <title>Caramel Hockey - Top 1 World</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #fff; font-family: 'Arial Rounded MT Bold', sans-serif; touch-action: none; }
        #game-ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        
        /* Верхняя панель Elo */
        #top-info { width: 90%; display: flex; justify-content: space-between; padding: 20px; color: #555; font-size: 24px; text-shadow: 1px 1px 0 #fff; }
        .stars { color: #ffcc00; font-size: 30px; letter-spacing: 5px; }

        /* Экран Гола */
        #goal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; z-index: 100; }
        .goal-cloud { background: white; padding: 40px 80px; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; border: 8px solid currentColor; font-size: 80px; font-weight: bold; transform: scale(0); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .show-goal { display: flex !important; }
        
        canvas { display: block; background: #e3f2fd; cursor: none; }
    </style>
</head>
<body>

<div id="game-ui">
    <div id="top-info">
        <div>моё эло: <span id="my-elo">204</span></div>
        <div class="stars">★★★★★</div>
        <div>эло противника: <span id="opp-elo">273</span></div>
    </div>
</div>

<div id="goal-overlay">
    <div class="goal-cloud" id="goal-text">GOAL!</div>
</div>

<canvas id="arena"></canvas>

<script>
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');
const goalOverlay = document.getElementById('goal-overlay');
const goalText = document.getElementById('goal-text');

let isPlaying = true;
let score = { p1: 0, p2: 0 };

// Физические константы
const FRICTION = 0.985; // Трение льда
const MAX_SPEED = 20;

// Объекты
const puck = { x: 0, y: 0, vx: 0, vy: 0, r: 20 };
const p1 = { x: 0, y: 0, r: 45, color: '#ff4444', prevX: 0, prevY: 0 };
const p2 = { x: 0, y: 0, r: 45, color: '#4444ff' };

function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    resetPuck();
    p1.x = 150; p1.y = canvas.height / 2;
    p2.x = canvas.width - 150; p2.y = canvas.height / 2;
}

function resetPuck() {
    puck.x = canvas.width / 2;
    puck.y = canvas.height / 2;
    puck.vx = 0;
    puck.vy = 0;
}

// Рисование кота в шлеме
function drawCat(x, y, r, color, isP1) {
    ctx.save();
    ctx.translate(x, y);
    if (!isP1) ctx.scale(-1, 1);

    // Тело/Голова
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.stroke();

    // Шлем
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(0, -5, r, Math.PI, 0); ctx.fill();
    
    // Глаза
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(-15, 0, 10, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(15, 0, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#000";
    ctx.beginPath(); ctx.arc(-12, 0, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(18, 0, 4, 0, Math.PI*2); ctx.fill();

    // Усы
    ctx.strokeStyle = "#000"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(25, 5); ctx.lineTo(40, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(25, 10); ctx.lineTo(40, 15); ctx.stroke();

    ctx.restore();
}

function drawArena() {
    // Лёд
    ctx.fillStyle = '#e3f2fd';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Разметка
    ctx.strokeStyle = 'rgba(33, 150, 243, 0.3)';
    ctx.lineWidth = 8;
    ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height / 2, 80, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(canvas.width / 2, 0); ctx.lineTo(canvas.width / 2, canvas.height); ctx.stroke();

    // Декор (Снежинки/Звезды)
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.font = '30px Arial';
    ctx.fillText('❄', 100, 100); ctx.fillText('★', canvas.width - 150, 120);
    ctx.fillText('★', 200, canvas.height - 100); ctx.fillText('❄', canvas.width - 250, canvas.height - 200);
}

function showGoalEffect(winnerColor) {
    isPlaying = false;
    goalOverlay.style.background = winnerColor + 'aa';
    goalText.style.color = winnerColor;
    goalOverlay.classList.add('show-goal');
    setTimeout(() => goalText.style.transform = 'scale(1)', 10);

    setTimeout(() => {
        goalOverlay.classList.remove('show-goal');
        goalText.style.transform = 'scale(0)';
        resetPuck();
        isPlaying = true;
    }, 1500);
}

function update() {
    if (!isPlaying) return;

    // Движение шайбы с трением
    puck.vx *= FRICTION;
    puck.vy *= FRICTION;
    puck.x += puck.vx;
    puck.y += puck.vy;

    // Отскок от бортов
    if (puck.y < puck.r || puck.y > canvas.height - puck.r) puck.vy *= -1;

    // Логика бота (Противник)
    let botTargetY = puck.y;
    p2.y += (botTargetY - p2.y) * 0.07;
    p2.x = canvas.width - 100;

    // Столкновения (Передача импульса)
    [p1, p2].forEach(p => {
        let dx = puck.x - p.x;
        let dy = puck.y - p.y;
        let dist = Math.hypot(dx, dy);

        if (dist < puck.r + p.r) {
            // Вычисление угла столкновения
            let angle = Math.atan2(dy, dx);
            
            // Если это игрок, добавляем импульс от движения руки
            if (p === p1) {
                let mouseVX = p1.x - p1.prevX;
                let mouseVY = p1.y - p1.prevY;
                puck.vx = Math.cos(angle) * 10 + mouseVX * 0.5;
                puck.vy = Math.sin(angle) * 10 + mouseVY * 0.5;
            } else {
                puck.vx = Math.cos(angle) * 12;
                puck.vy = Math.sin(angle) * 12;
            }

            // Выталкивание шайбы (чтобы не застревала)
            puck.x = p.x + Math.cos(angle) * (puck.r + p.r);
            puck.y = p.y + Math.sin(angle) * (puck.r + p.r);
        }
    });

    // Проверка гола
    if (puck.x < -puck.r) showGoalEffect('#4444ff');
    if (puck.x > canvas.width + puck.r) showGoalEffect('#ff4444');

    // Ограничение скорости
    puck.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, puck.vx));
    puck.vy = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, puck.vy));
}

function render() {
    drawArena();
    
    // Шайба
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

    drawCat(p1.x, p1.y, p1.r, p1.color, true);
    drawCat(p2.x, p2.y, p2.r, p2.color, false);

    update();
    requestAnimationFrame(render);
}

// Управление
canvas.addEventListener('mousemove', e => {
    p1.prevX = p1.x;
    p1.prevY = p1.y;
    p1.x = e.clientX;
    p1.y = e.clientY;
    // Ограничение зоной игрока (половина поля)
    if (p1.x > canvas.width / 2 - p1.r) p1.x = canvas.width / 2 - p1.r;
});

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const touch = e.touches[0];
    p1.prevX = p1.x;
    p1.prevY = p1.y;
    p1.x = touch.clientX;
    p1.y = touch.clientY;
    if (p1.x > canvas.width / 2 - p1.r) p1.x = canvas.width / 2 - p1.r;
}, { passive: false });

init();
render();
</script>
</body>
</html>
