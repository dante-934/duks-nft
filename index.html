<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DuksNFT - Hybrid Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #ffffff; --text: #1c1c1e; --header-bg: #f2f2f7;
            --nav-bg: #e5e5ea; --accent: #007aff;
            --common: rgba(0, 122, 255, 0.5); --epic: #af52de; 
            --legendary: #ffcc00; --mythic: #ff3b30;
        }
        [data-theme="dark"] {
            --bg: #000000; --text: #ffffff; --header-bg: #1c1c1e; --nav-bg: #2c2c2e; --accent: #0a84ff;
        }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; user-select: none; }
        header { padding: 15px; background: var(--header-bg); border-bottom: 1px solid rgba(128,128,128,0.2); position: sticky; top: 0; z-index: 1000; }
        .balance { background: var(--accent); color: white; padding: 6px 14px; border-radius: 20px; font-weight: 800; }
        nav { display: flex; gap: 8px; margin-top: 10px; }
        .nav-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; background: var(--nav-bg); color: var(--text); font-weight: 700; font-size: 12px; cursor: pointer; }
        .nav-btn.active { background: var(--accent); color: white; }
        .screen { display: none; padding: 20px; text-align: center; }
        .screen.active { display: block; }
        .case-box { background: var(--header-bg); padding: 25px; border-radius: 24px; margin-bottom: 20px; border: 1px solid rgba(128,128,128,0.1); }
        .open-button { width: 100%; padding: 16px; background: #34c759; color: white; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item { background: var(--header-bg); padding: 15px; border-radius: 18px; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; min-height: 110px; justify-content: center; }
        .glow { position: absolute; width: 60px; height: 60px; filter: blur(20px); border-radius: 50%; opacity: 0.5; z-index: 0; }
        .glow-rainbow { animation: rainbow 3s linear infinite; }
        @keyframes rainbow { 0% { background: red; } 33% { background: yellow; } 66% { background: blue; } 100% { background: red; } }
        .sell-btn { z-index: 2; margin-top: 10px; width: 100%; border: 1px solid #ff3b30; color: #ff3b30; background: transparent; padding: 6px; border-radius: 10px; font-size: 10px; font-weight: 800; }
        
        .profile-card { background: var(--header-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: left; }
        .google-login-btn { background: white; color: black; border: 1px solid #ddd; padding: 10px; border-radius: 12px; width: 100%; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; cursor: pointer; }
        #admin-auth-box { margin-top: 20px; padding: 15px; border: 1px dashed var(--accent); border-radius: 15px; display: none; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-weight:900; font-size:22px; color:var(--accent);">DuksNFT</div>
        <div class="balance"><span id="b-val">0</span> D</div>
    </div>
    <nav>
        <button class="nav-btn active" id="btn-cases" onclick="show('cases', 'btn-cases')">Кейсы</button>
        <button class="nav-btn" id="btn-inv" onclick="show('inventory', 'btn-inv')">Инвентарь</button>
        <button class="nav-btn" onclick="handleSettings()">⚙️</button>
    </nav>
</header>

<main>
    <div id="cases" class="screen active"></div>
    <div id="inventory" class="screen"><div class="grid" id="inv-g"></div></div>
    
    <div id="settings" class="screen">
        <div class="profile-card">
            <h3 style="margin-top:0;">👤 Профиль</h3>
            <div id="auth-info">
                <p style="font-size: 13px; color: #888;">Прогресс: <b>Локальный</b> (не сохранен в облаке)</p>
                <button class="google-login-btn" id="bind-btn" onclick="loginWithGoogle()">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_Hi_res_logo.png" width="16">
                    Привязать Google
                </button>
            </div>
            <div id="user-profile" style="display:none;">
                <p style="margin: 5px 0; font-weight: bold;" id="user-email"></p>
                <p style="font-size: 12px; color: #34c759;">✓ Облачное сохранение активно</p>
                <button class="nav-btn" onclick="logout()" style="background:#ff3b30; color:white; margin-top:10px; width:100%;">Выйти</button>
            </div>
        </div>

        <button class="nav-btn" onclick="resetGame()" style="width:100%; border: 1px solid #ff3b30; color:#ff3b30; background:transparent;">Сбросить прогресс</button>

        <div id="admin-auth-box">
            <input type="password" id="admin-input" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;" placeholder="Код Zxc...">
            <button class="nav-btn" onclick="checkAdminCode()" style="background:var(--accent); color:white; width:100%;">Войти</button>
        </div>
        <div id="admin-menu" style="display:none; margin-top:15px; background:#fff3cd; padding:15px; border-radius:15px; color:#856404;">
            <b>Admin Active</b><br>
            <button onclick="addM(1000000)" class="nav-btn" style="background:#28a745; color:white; width:100%; margin-top:10px;">+1M Duks</button>
        </div>
    </div>
</main>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDno2jAXYzNc8EN3pkYbrhwkJ5v4aVBxH8",
        authDomain: "duksnft.firebaseapp.com",
        projectId: "duksnft",
        storageBucket: "duksnft.firebasestorage.app",
        messagingSenderId: "774746155070",
        appId: "1:774746155070:web:8e9718290ea579ffd8096f"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const CONFIG = [
        { name: "Бедный", price: 200, icon: "📦", items: [
            { n: "Перо", sell: 150, c: "var(--common)", i: "🪶" },
            { n: "Урна", sell: 195, c: "var(--epic)", i: "⚱️" }
        ]},
        { name: "Мощный", price: 2000, icon: "⚡", items: [
            { n: "Эспандер", sell: 5000, c: "var(--mythic)", i: "💪" },
            { n: "Золотой эспандер", sell: 6000, c: "var(--legendary)", i: "💪✨" }
        ]},
        { name: "Эксклюзив", price: 15000, icon: "✨", items: [
            { n: "Луна", sell: 10000, c: "rainbow", i: "🌙" },
            { n: "Солнце", sell: 10000, c: "rainbow", i: "☀️" }
        ]}
    ];

    let b = 1000; let inv = []; let settingClicks = 0; let isLoaded = false;

    async function init() {
        // 1. Грузим локально
        const lb = localStorage.getItem('db');
        const li = localStorage.getItem('di');
        if(lb) b = parseInt(lb);
        if(li) inv = JSON.parse(li);

        // 2. Слушаем вход
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('auth-info').style.display = 'none';
                document.getElementById('user-profile').style.display = 'block';
                document.getElementById('user-email').innerText = user.email;
                await syncWithCloud(user);
            } else {
                document.getElementById('auth-info').style.display = 'block';
                document.getElementById('user-profile').style.display = 'none';
            }
            updateUI();
        });
        renderCases();
        updateUI();
    }

    async function syncWithCloud(user) {
        try {
            const ref = db.collection("users").doc(user.uid);
            const doc = await ref.get({ source: 'server' });
            if (doc.exists) {
                const cloud = doc.data();
                // Синхронизация: выбираем большее значение баланса
                if (cloud.balance > b) b = cloud.balance;
                if (cloud.inventory && cloud.inventory.length > inv.length) inv = cloud.inventory;
            }
            // Сразу сохраняем текущее состояние в облако
            await ref.set({ balance: b, inventory: inv, email: user.email }, { merge: true });
        } catch(e) { console.error("Sync error:", e); }
    }

    function save() {
        localStorage.setItem('db', b);
        localStorage.setItem('di', JSON.stringify(inv));
        updateUI();
        if (auth.currentUser) {
            db.collection("users").doc(auth.currentUser.uid).set({ balance: b, inventory: inv }, { merge: true })
              .catch(e => console.error("Cloud save error:", e));
        }
    }

    function updateUI() {
        document.getElementById('b-val').innerText = b.toLocaleString();
        const g = document.getElementById('inv-g');
        g.innerHTML = inv.length ? '' : '<p style="grid-column:1/-1; opacity:0.5; margin-top:20px;">Инвентарь пуст</p>';
        inv.forEach((it, idx) => {
            g.innerHTML += `<div class="item">
                <div class="glow ${it.c === 'rainbow' ? 'glow-rainbow' : ''}" style="background:${it.c === 'rainbow' ? '' : it.c}"></div>
                <div style="font-size:35px; z-index:1;">${it.i}</div>
                <button class="sell-btn" onclick="sell(${idx})">${it.sell} D</button>
            </div>`;
        });
    }

    function renderCases() {
        document.getElementById('cases').innerHTML = CONFIG.map((c, i) => `
            <div class="case-box">
                <div style="font-size:50px;">${c.icon}</div>
                <h2>${c.name}</h2>
                <button class="open-button" onclick="openC(${i})">${c.price} Duks</button>
            </div>`).join('');
    }

    function openC(i) {
        if (b < CONFIG[i].price) return alert('Мало денег');
        b -= CONFIG[i].price;
        inv.push({...CONFIG[i].items[Math.floor(Math.random() * CONFIG[i].items.length)]});
        save();
    }

    function sell(idx) { b += inv[idx].sell; inv.splice(idx, 1); save(); }
    
    function show(id, btnId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        if(btnId) document.getElementById(btnId).classList.add('active');
    }

    function handleSettings() { settingClicks++; show('settings'); if(settingClicks >= 5) document.getElementById('admin-auth-box').style.display='block'; }
    function checkAdminCode() { if(document.getElementById('admin-input').value === "Zxc1234Zxc") document.getElementById('admin-menu').style.display='block'; }
    function addM(v) { b += v; save(); }

    // УЛУЧШЕННЫЙ ВХОД (POPUP)
    function loginWithGoogle() {
        const btn = document.getElementById('bind-btn');
        btn.innerText = "Загрузка...";
        const provider = new firebase.auth.GoogleAuthProvider();
        
        auth.signInWithPopup(provider)
            .then((result) => {
                console.log("Привязка успешна!");
            })
            .catch((error) => {
                btn.innerText = "Привязать Google";
                if(error.code === 'auth/popup-blocked') {
                    alert("Браузер заблокировал окно. Разрешите всплывающие окна для этого сайта.");
                } else {
                    alert("Ошибка: " + error.message);
                }
            });
    }

    function logout() { auth.signOut().then(() => location.reload()); }
    function resetGame() { if(confirm("Сбросить весь прогресс?")) { localStorage.clear(); location.reload(); } }

    init();
</script>
</body>
    </html>
