<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DuksNFT - Cloud Stable</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #ffffff; --text: #1c1c1e; --header-bg: #f2f2f7;
            --nav-bg: #e5e5ea; --accent: #007aff; --card: #ffffff;
            --common: #007aff; --epic: #af52de; --legendary: #ffcc00;
            --mythic: #ff3b30; --exclusive: linear-gradient(45deg, #ff0000, #ff00ff, #0000ff, #00ffff, #00ff00, #ffff00, #ff0000);
            --divine: #f0f0f0;
        }
        [data-theme="dark"] {
            --bg: #121212; --text: #ffffff; --header-bg: #1c1c1e; 
            --nav-bg: #2c2c2e; --accent: #0a84ff; --card: #252525;
        }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        
        /* Профиль */
        header { padding: 15px; background: var(--header-bg); border-bottom: 1px solid rgba(128,128,128,0.2); position: sticky; top: 0; z-index: 1000; }
        .user-bar { display: flex; align-items: center; gap: 12px; }
        .avatar-box { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); overflow: hidden; position: relative; cursor: pointer; background: #ccc; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .stat-card { background: var(--nav-bg); padding: 8px; border-radius: 10px; font-size: 10px; text-align: center; }
        
        .balance { background: var(--accent); color: white; padding: 6px 15px; border-radius: 20px; font-weight: 800; font-size: 14px; }
        
        nav { display: flex; gap: 5px; }
        .nav-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; background: var(--nav-bg); color: var(--text); font-weight: bold; cursor: pointer; font-size: 12px; }
        .nav-btn.active { background: var(--accent); color: white; }

        /* Внутриигровые окна */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 20px; width: 80%; max-width: 300px; text-align: center; }
        .modal input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }

        /* Кейсы */
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .case-card { background: var(--card); padding: 20px; border-radius: 25px; margin-bottom: 15px; border: 1px solid rgba(128,128,128,0.1); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .case-img { font-size: 50px; margin-bottom: 10px; transition: 0.2s; }
        .shaking { animation: shake 0.4s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-1px, -2px) rotate(-1deg); } 40% { transform: translate(-3px, 0px) rotate(1deg); } 100% { transform: translate(1px, -1px) rotate(0deg); } }

        .btn-open { width: 100%; padding: 15px; border: none; border-radius: 15px; background: #34c759; color: white; font-weight: 800; font-size: 16px; cursor: pointer; }

        /* Инвентарь */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item { background: var(--card); border-radius: 15px; padding: 15px; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(128,128,128,0.1); }
        .glow { position: absolute; width: 60px; height: 60px; filter: blur(20px); border-radius: 50%; opacity: 0.5; }
        .rainbow { background: var(--exclusive); animation: rbw 3s linear infinite; }
        @keyframes rbw { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        .sell-btn { z-index: 2; width: 100%; margin-top: 10px; border: 1px solid #ff3b30; color: #ff3b30; background: none; border-radius: 8px; font-size: 10px; font-weight: bold; padding: 5px; }

        .admin-box { display: none; background: #fff3cd; padding: 15px; border-radius: 15px; margin-top: 15px; border: 2px solid #ffeeba; text-align: left; color: #856404; }
    </style>
</head>
<body>

<header>
    <div class="user-bar">
        <div class="avatar-box" onclick="document.getElementById('file-input').click()">
            <img id="display-av" src="https://via.placeholder.com/50" alt="AV">
        </div>
        <input type="file" id="file-input" hidden accept="image/*" onchange="uploadAv(event)">
        <div style="flex:1">
            <div id="display-nick" style="font-weight:900; font-size:16px;" onclick="openNickModal()">Загрузка...</div>
            <div id="display-lvl" style="font-size:10px; opacity:0.6;">Уровень 1</div>
        </div>
        <div class="balance"><span id="b-val">0</span> D</div>
    </div>
    <div class="stats-grid">
        <div class="stat-card">Ценность: <br><b id="stat-worth">0</b> D</div>
        <div class="stat-card">Слот: <br><b id="stat-count">0</b></div>
    </div>
    <nav>
        <button class="nav-btn active" id="btn-cases" onclick="show('cases', 'btn-cases')">Кейсы</button>
        <button class="nav-btn" id="btn-inv" onclick="show('inventory', 'btn-inv')">Инвентарь</button>
        <button class="nav-btn" id="btn-set" onclick="handleAdminClicks()">⚙️</button>
    </nav>
</header>

<main>
    <div id="cases" class="screen active"></div>
    <div id="inventory" class="screen"><div class="grid" id="inv-grid"></div></div>
    
    <div id="settings" class="screen">
        <h2>Настройки</h2>
        <button class="nav-btn" onclick="toggleTheme()" style="width:100%; margin-bottom:10px;">Сменить тему</button>
        <button class="nav-btn" id="login-btn" onclick="login()" style="width:100%; background:#fff; color:#000; border:1px solid #ddd;">Войти через Google</button>
        <button class="nav-btn" id="logout-btn" onclick="logout()" style="display:none; width:100%; background:#ff3b30; color:white;">Выйти из аккаунта</button>

        <div id="admin-menu" class="admin-box">
            <b>🛠 ADMIN PANEL</b>
            <input type="number" id="adm-d" placeholder="+ Деньги">
            <input type="number" id="adm-x" placeholder="+ XP">
            <select id="adm-item-list"></select>
            <button class="nav-btn" onclick="adminAction(true)" style="width:100%; background:#28a745; color:white; margin-top:5px;">Применить к себе</button>
            <hr>
            <input type="text" id="adm-target" placeholder="Ник игрока">
            <button class="nav-btn" onclick="adminAction(false)" style="width:100%; background:#007aff; color:white;">Отправить игроку</button>
        </div>
    </div>
</main>

<div id="nick-modal" class="modal">
    <div class="modal-content">
        <h3>Изменить ник</h3>
        <input type="text" id="new-nick-input" maxlength="12" placeholder="Ваше имя">
        <button class="nav-btn" style="background:var(--accent); color:white; width:100%;" onclick="saveNick()">Сохранить</button>
        <button class="nav-btn" style="width:100%; margin-top:5px;" onclick="closeNickModal()">Отмена</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDno2jAXYzNc8EN3pkYbrhwkJ5v4aVBxH8",
        authDomain: "duksnft.firebaseapp.com",
        projectId: "duksnft",
        storageBucket: "duksnft.firebasestorage.app",
        messagingSenderId: "774746155070",
        appId: "1:774746155070:web:8e9718290ea579ffd8096f"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ALL_ITEMS = [
        { n: "Перо", sell: 150, r: "common", i: "🪶", chance: 33 },
        { n: "Урна", sell: 150, r: "common", i: "⚱️", chance: 33 },
        { n: "Старый ботинок", sell: 150, r: "common", i: "👞", chance: 33 },
        { n: "Золотой слиток", sell: 1000, r: "legendary", i: "🧈", chance: 1 },
        { n: "Эспандер", sell: 1500, r: "mythic", i: "💪", chance: 50 },
        { n: "Золотой эспандер", sell: 2000, r: "mythic", i: "💪✨", chance: 20 },
        { n: "Алмазный эспандер", sell: 1500, r: "mythic", i: "💪💎", chance: 10 },
        { n: "Божественный эспандер", sell: 10000, r: "exclusive", i: "☄️", chance: 1 },
        { n: "Золотой кубок", sell: 15000, r: "legendary", i: "🏆", chance: 5 },
        { n: "Мешок денег", sell: 5000, r: "exclusive", i: "💰", chance: 10 },
        { n: "Телефон", sell: 3000, r: "epic", i: "📱", chance: 15 },
        { n: "Корона Создателя", sell: 50000, r: "divine", i: "👑", chance: 0 }
    ];

    const CASES = [
        { name: "Бедный", p: 200, icon: "📦", pool: [0,1,2,3] },
        { name: "Мощный", p: 2000, icon: "⚡", pool: [4,5,6,7] },
        { name: "@#₽#37₽", p: 5000, icon: "🏷️", pool: [8,9,10,11] }
    ];

    let user = { b: 1000, inv: [], xp: 0, nick: "Новичок", av: "" };
    let aClicks = 0;

    async function init() {
        auth.onAuthStateChanged(async (u) => {
            if (u) {
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'block';
                await loadCloud(u.uid);
            } else {
                user.nick = "Гость";
            }
            updateUI();
        });

        const s = document.getElementById('adm-item-list');
        ALL_ITEMS.forEach((it, i) => s.innerHTML += `<option value="${i}">${it.i} ${it.n}</option>`);
        renderCases();
    }

    async function loadCloud(uid) {
        const d = await db.collection("users").doc(uid).get();
        if (d.exists) user = {...user, ...d.data()};
        else await db.collection("users").doc(uid).set(user);
    }

    async function sync() {
        updateUI();
        if (auth.currentUser) await db.collection("users").doc(auth.currentUser.uid).set(user, { merge: true });
    }

    function updateUI() {
        document.getElementById('b-val').innerText = user.b.toLocaleString();
        document.getElementById('display-nick').innerText = user.nick;
        if(user.av) document.getElementById('display-av').src = user.av;
        
        const lvl = Math.floor(Math.sqrt(user.xp / 100)) + 1;
        document.getElementById('display-lvl').innerText = `Уровень ${lvl} (${user.xp} XP)`;

        let worth = 0;
        const g = document.getElementById('inv-grid');
        g.innerHTML = user.inv.length ? '' : '<p style="grid-column:1/-1; opacity:0.2;">Пусто</p>';
        
        user.inv.forEach((it, i) => {
            worth += it.sell;
            const isEx = it.r === 'exclusive';
            g.innerHTML += `<div class="item">
                <div class="glow ${isEx ? 'rainbow' : ''}" style="${isEx ? '' : 'background:var(--'+it.r+')'}"></div>
                <div style="font-size:30px; z-index:1;">${it.i}</div>
                <button class="sell-btn" onclick="sell(${i})">${it.sell} D</button>
            </div>`;
        });
        document.getElementById('stat-worth').innerText = worth.toLocaleString();
        document.getElementById('stat-count').innerText = user.inv.length;
    }

    function renderCases() {
        document.getElementById('cases').innerHTML = CASES.map((c, i) => `
            <div class="case-card">
                <div class="case-img" id="img-${i}">${c.icon}</div>
                <h3>${c.name}</h3>
                <button class="btn-open" onclick="openCase(${i})">${c.p} Duks</button>
            </div>`).join('');
    }

    function openCase(i) {
        if (user.b < CASES[i].p) return alert("Недостаточно Duks");
        user.b -= CASES[i].p;
        
        const img = document.getElementById(`img-${i}`);
        img.classList.add('shaking');
        
        setTimeout(() => {
            const p = [];
            CASES[i].pool.forEach(idx => { for(let k=0; k<ALL_ITEMS[idx].chance; k++) p.push(ALL_ITEMS[idx]); });
            const win = {...p[Math.floor(Math.random()*p.length)]};
            user.inv.push(win);
            user.xp += 30;
            img.classList.remove('shaking');
            sync();
        }, 700);
    }

    function sell(i) { user.b += user.inv[i].sell; user.inv.splice(i, 1); sync(); }

    // АВАТАР И НИК
    function uploadAv(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onloadend = () => { user.av = reader.result; sync(); };
        if(file) reader.readAsDataURL(file);
    }

    function openNickModal() { document.getElementById('nick-modal').style.display = 'flex'; }
    function closeNickModal() { document.getElementById('nick-modal').style.display = 'none'; }
    function saveNick() {
        const n = document.getElementById('new-nick-input').value.trim();
        if(n) { user.nick = n; sync(); closeNickModal(); }
    }

    function handleAdminClicks() {
        show('settings', 'btn-set');
        aClicks++;
        if(aClicks >= 5) {
            const code = prompt("Enter Code:");
            if(code === "Zxc1234Zxc") document.getElementById('admin-menu').style.display = 'block';
            aClicks = 0;
        }
    }

    async function adminAction(self) {
        const d = parseInt(document.getElementById('adm-d').value || 0);
        const x = parseInt(document.getElementById('adm-x').value || 0);
        const item = ALL_ITEMS[document.getElementById('adm-item-list').value];

        if(self) {
            user.b += d; user.xp += x; user.inv.push({...item}); sync();
        } else {
            const t = document.getElementById('adm-target').value;
            const s = await db.collection("users").where("nick", "==", t).get();
            if(!s.empty) {
                const rid = s.docs[0].id;
                const rd = s.docs[0].data();
                rd.b = (rd.b||0)+d; rd.xp = (rd.xp||0)+x;
                rd.inv = rd.inv || []; rd.inv.push({...item});
                await db.collection("users").doc(rid).set(rd, {merge:true});
                alert("Отправлено!");
            } else alert("Не найден");
        }
    }

    function show(id, bid) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(bid).classList.add('active');
    }

    function toggleTheme() {
        const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', t);
    }

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }

    init();
</script>
</body>
</html>
