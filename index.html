<!DOCTYPE html>
<html lang="ru">
<head>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>

    <style>
        :root {
            --bg: #ffffff; --text: #1c1c1e; --accent: #007aff; --card: #f2f2f7;
            --common: #007aff; --epic: #af52de; --legendary: #ffcc00; 
            --mythic: #ff3b30; --exclusive: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet);
            --divine: #ffffff;
        }
        [data-theme="dark"] { --bg: #000000; --text: #ffffff; --card: #1c1c1e; }
        
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        header { padding: 16px; background: var(--card); border-bottom: 1px solid rgba(128,128,128,0.2); position: sticky; top: 0; z-index: 1000; }
        
        .user-bar { display: flex; align-items: center; gap: 12px; }
        .avatar-box { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); overflow: hidden; background: #333; cursor: pointer; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .balance-badge { background: var(--accent); color: white; padding: 7px 15px; border-radius: 20px; font-weight: 800; font-size: 14px; }
        
        nav { display: flex; gap: 8px; margin: 15px 16px; }
        .nav-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; background: rgba(128,128,128,0.1); color: var(--text); font-weight: bold; cursor: pointer; transition: 0.2s; }
        .nav-btn.active { background: var(--accent); color: white; }

        .screen { display: none; padding: 20px; min-height: 200px; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .case-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(128,128,128,0.2); text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item-card { background: var(--card); border-radius: 22px; padding: 15px; position: relative; display: flex; flex-direction: column; align-items: center; overflow: hidden; border: 1px solid rgba(128,128,128,0.1); text-align: center; }
        
        .glow { position: absolute; width: 70px; height: 70px; filter: blur(25px); border-radius: 50%; opacity: 0.4; top: 10%; z-index: 0; }
        .rarity-exclusive { background: var(--exclusive) !important; opacity: 0.7 !important; animation: rainbow 3s linear infinite; }
        @keyframes rainbow { 0% { filter: hue-rotate(0deg) blur(25px); } 100% { filter: hue-rotate(360deg) blur(25px); } }
        .rarity-divine { background: #fff; box-shadow: 0 0 15px #fff; border: 1px solid #ddd; }

        .admin-section { background: rgba(255,165,0,0.05); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px dashed orange; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-body { background: var(--bg); padding: 25px; border-radius: 25px; width: 85%; max-width: 320px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid rgba(128,128,128,0.3); background: var(--bg); color: var(--text); box-sizing: border-box; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 30px; display: none; z-index: 3000; font-weight: bold; font-size: 14px; }
    </style>
</head>
<script>
    // Применяем тему моментально до загрузки body
    if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
</script>

                <button class="nav-btn active" style="width:100%; background:#ff3b30;" onclick="resP()">ОБНУЛИТЬ ПОЛНОСТЬЮ</button>
            </div>
        </div>
    </div>
</main>

<script>

    const ITEMS = [
        { n: "Обычный NFT", sell: 500, r: "common", i: "📦" },
        { n: "Эпический NFT", sell: 1200, r: "epic", i: "💎" },
        { n: "Легендарный NFT", sell: 5000, r: "legendary", i: "👑" },

    ];

    let pData = { b: 1000, inv: [], xp: 0, nick: "Гость", av: "", numericId: 0 };
    let aClicks = 0;

    async function init() {
        auth.onAuthStateChanged(async (u) => {
            if (u) {
                document.getElementById('l-in').style.display = 'none';
                document.getElementById('l-out').style.display = 'block';
                await loadUser(u.uid);
            } else {
                pData.nick = "Гость";
                upUI();
            }
        });
        const s = document.getElementById('a-it');
        ITEMS.forEach((it, i) => s.innerHTML += `<option value="${i}">${it.i} ${it.n}</option>`);
    }

    async function loadUser(uid) {
        try {
            const doc = await db.collection("users").doc(uid).get();
            if (doc.exists) {
                const data = doc.data();
                pData = {...pData, ...data, inv: data.inv || []};
                if(!pData.numericId || pData.numericId === 0) {
                    pData.numericId = await getNextId();
                    await db.collection("users").doc(uid).update({numericId: pData.numericId});
                }
            } else {
                pData.numericId = await getNextId();
                await db.collection("users").doc(uid).set(pData);
            }
            document.getElementById('h-id').innerText = `ID: ${pData.numericId}`;
            upUI();
        } catch(e) {
            console.error(e);
            ms("Ошибка данных. Перезагрузите.");
            upUI();
        }
    }

    async function getNextId() {
        try {
            const confRef = db.collection("settings").doc("counter");
            return await db.runTransaction(async (t) => {
                const doc = await t.get(confRef);
                let next = 100000001;
                if (doc.exists && doc.data().last) next = doc.data().last + 1;
                t.set(confRef, { last: next }, { merge: true });
                return next;
            });
        } catch(e) {
            return 100000000 + Math.floor(Math.random() * 999);
        }
    }

    async function sync() {
        upUI();
        if (auth.currentUser) {
            try {
                await db.collection("users").doc(auth.currentUser.uid).set(pData, { merge: true });
            } catch(e) { console.error("Sync error:", e); }
        }
    }

    function upUI() {
        document.getElementById('h-bal').innerText = (pData.b || 0).toLocaleString();
        document.getElementById('h-nick').innerText = pData.nick || "Гость";
        if(pData.av) document.getElementById('h-av').src = pData.av;
        const lvl = Math.floor(Math.sqrt((pData.xp || 0) / 100)) + 1;
        document.getElementById('h-lvl').innerText = `УРОВЕНЬ ${lvl} | ОПЫТ ${pData.xp}`;
        
        const g = document.getElementById('inv-grid');
        g.innerHTML = "";
        const inv = pData.inv || [];
        inv.forEach((it, i) => {
            const isEx = it.r === 'exclusive' ? 'rarity-exclusive' : '';
            const isDiv = it.r === 'divine' ? 'rarity-divine' : '';
            const glowColor = it.r === 'exclusive' ? '' : `background:var(--${it.r})`;
            
            g.innerHTML += `
                <div class="item-card ${isDiv}">
                    <div class="glow ${isEx}" style="${glowColor}"></div>
                    <div style="font-size:40px; z-index:1;">${it.i}</div>
                    <div style="font-size:10px; font-weight:900; z-index:1; text-transform:uppercase; margin-top:5px;">${it.n}</div>
                    ${it.sell > 0 ? `<button class="nav-btn" style="font-size:9px; height:25px; margin-top:8px; width:80%;" onclick="sl(${i})">ПРОДАТЬ</button>` : ''}
                </div>`;
        });
    }

    function opC(type) {
        if(type === 'firestore') {
            if(pData.b < 2500) return ms("Мало D!");
            pData.b -= 2500;
            const r = Math.random() * 100;
            if(r < 50) pData.inv.push({...ITEMS[3]});
            else if(r < 70) pData.inv.push({...ITEMS[4]});
            else if(r < 85) pData.inv.push({...ITEMS[5]});
            else ms("Пусто...");
        } else {
            if(pData.b < 100) return ms("Мало D!");
            pData.b -= 100;
            const r = Math.random() * 100;
            if(r < 0.1) pData.inv.push({...ITEMS[7]});
            else pData.inv.push({...ITEMS[6]});
        }
        sync();
    }

    function sl(i) { pData.b += pData.inv[i].sell; pData.inv.splice(i,1); sync(); }
    function shNick() { document.getElementById('m-n').style.display = 'flex'; }
    function clM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    
    async function svN() {
        const val = document.getElementById('n-in').value.trim();
        if(val) { pData.nick = val; sync(); clM(); }
    }

        sw('settings', 'b-s');
        aClicks++;
        if(aClicks >= 5) { document.getElementById('m-c').style.display = 'flex'; aClicks = 0; }
    }

        if(document.getElementById('c-in').value === "duksnft_zxc1234zxc") {
            document.getElementById('a-box').style.display = 'block'; clM(); ms("Доступ разрешен");
        } else ms("Неверный код");
    }
