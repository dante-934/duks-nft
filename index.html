<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DuksNFT - Final Fix</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #ffffff; --text: #1c1c1e; --accent: #007aff; --card: #f2f2f7;
            --common: #8e8e93; --epic: #af52de; --legendary: #ffcc00; --mythic: #ff3b30;
        }
        [data-theme="dark"] { --bg: #121212; --text: #ffffff; --card: #1c1c1e; }
        
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        header { padding: 15px; background: var(--card); border-bottom: 1px solid rgba(128,128,128,0.2); position: sticky; top: 0; z-index: 1000; }
        
        .user-bar { display: flex; align-items: center; gap: 12px; }
        .avatar-box { width: 50px; height: 50px; border-radius: 50%; border: 2.5px solid var(--accent); overflow: hidden; background: #333; cursor: pointer; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .id-label { font-size: 11px; font-weight: 800; color: var(--accent); background: rgba(0,122,255,0.1); padding: 3px 10px; border-radius: 8px; margin-top: 4px; display: inline-block; cursor: pointer; }
        .balance-badge { background: var(--accent); color: white; padding: 7px 15px; border-radius: 20px; font-weight: 800; font-size: 14px; box-shadow: 0 4px 10px rgba(0,122,255,0.2); }
        
        nav { display: flex; gap: 8px; margin-top: 15px; }
        .nav-btn { flex: 1; padding: 12px; border: none; border-radius: 14px; background: rgba(128,128,128,0.1); color: var(--text); font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .nav-btn.active { background: var(--accent); color: white; }

        .screen { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item-card { background: var(--card); border-radius: 22px; padding: 15px; position: relative; display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(128,128,128,0.1); overflow: hidden; text-align: center; }
        .glow { position: absolute; width: 80px; height: 80px; filter: blur(30px); border-radius: 50%; opacity: 0.35; z-index: 0; top: 10%; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-body { background: var(--bg); padding: 25px; border-radius: 28px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal input, .modal select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 1.5px solid rgba(128,128,128,0.2); background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 16px; outline: none; }
        .modal input:focus { border-color: var(--accent); }

        .admin-panel { display: none; background: #fff3cd; color: #856404; padding: 18px; border-radius: 20px; margin-top: 15px; border: 2px solid #ffeeba; }
        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #1c1c1e; color: white; padding: 14px 28px; border-radius: 30px; display: none; z-index: 3000; font-weight: 600; font-size: 14px; box-shadow: 0 5px 20px rgba(0,0,0,0.4); }
    </style>
</head>
<body data-theme="light">

<header>
    <div class="user-bar">
        <div class="avatar-box" onclick="document.getElementById('f-in').click()">
            <img id="h-av" src="https://via.placeholder.com/150">
        </div>
        <input type="file" id="f-in" hidden accept="image/*" onchange="uAv(event)">
        <div style="flex:1">
            <div id="h-nick" style="font-weight:900; font-size:19px; letter-spacing:-0.5px;" onclick="shNick()">Загрузка...</div>
            <div class="id-label" id="h-id">ID: 000 000 000</div>
        </div>
        <div class="balance-badge"><span id="h-bal">0</span> D</div>
    </div>
    <nav>
        <button class="nav-btn active" id="t-i" onclick="sw('inv', 't-i')">Инвентарь</button>
        <button class="nav-btn" id="t-s" onclick="aCl()">⚙️ Настройки</button>
    </nav>
</header>

<main>
    <div id="inv" class="screen active">
        <div id="h-lvl" style="margin-bottom:15px; font-weight:bold; opacity:0.6; font-size:13px; text-transform: uppercase;">Уровень 1</div>
        <div class="grid" id="inv-grid"></div>
    </div>
    
    <div id="settings" class="screen">
        <h3>Настройки</h3>
        <button class="nav-btn" onclick="tTh()" style="width:100%; margin-bottom:12px; height:55px; background:rgba(128,128,128,0.1);">Сменить тему</button>
        <button class="nav-btn" id="l-in" onclick="login()" style="width:100%; background:white; color:black; border:1px solid #ddd; height:55px;">Войти через Google</button>
        <button class="nav-btn" id="l-out" onclick="logout()" style="display:none; width:100%; background:#ff3b30; color:white; height:55px;">Выйти из аккаунта</button>

        <div id="a-box" class="admin-panel">
            <b>🛠 ПАНЕЛЬ УПРАВЛЕНИЯ</b>
            <input type="number" id="a-d" placeholder="+ Деньги">
            <input type="number" id="a-x" placeholder="+ Опыт">
            <select id="a-it"></select>
            <button class="nav-btn" onclick="gv(true)" style="width:100%; background:#28a745; color:white; margin:8px 0;">Выдать себе</button>
            <hr style="border:0; border-top:1px solid rgba(133,100,4,0.2); margin:12px 0;">
            <input type="number" id="a-tid" placeholder="9-значный ID игрока">
            <button class="nav-btn" onclick="gv(false)" style="width:100%; background:#007aff; color:white;">Выдать игроку по ID</button>
        </div>
    </div>
</main>

<div id="m-n" class="modal"><div class="modal-body">
    <h3>Смена ника</h3>
    <input type="text" id="n-in" maxlength="12" placeholder="Новое имя">
    <button class="nav-btn" style="background:var(--accent); color:white; width:100%;" onclick="svN()">Сохранить</button>
    <button class="nav-btn" style="width:100%; margin-top:10px;" onclick="clM()">Отмена</button>
</div></div>

<div id="m-c" class="modal"><div class="modal-body">
    <h3>Режим разработчика</h3>
    <input type="password" id="c-in" placeholder="Введите код доступа">
    <button class="nav-btn" style="background:var(--accent); color:white; width:100%;" onclick="chC()">Войти</button>
    <button class="nav-btn" style="width:100%; margin-top:10px;" onclick="clM()">Отмена</button>
</div></div>

<div id="toast" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDno2jAXYzNc8EN3pkYbrhwkJ5v4aVBxH8",
        authDomain: "duksnft.firebaseapp.com",
        projectId: "duksnft",
        storageBucket: "duksnft.firebasestorage.app",
        messagingSenderId: "774746155070",
        appId: "1:774746155070:web:8e9718290ea579ffd8096f"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ITEMS = [
        { n: "Обычный NFT", sell: 500, r: "common", i: "📦" },
        { n: "Эпический NFT", sell: 1200, r: "epic", i: "💎" },
        { n: "Легендарный NFT", sell: 5000, r: "legendary", i: "👑" },
        { n: "Мифический NFT", sell: 15000, r: "mythic", i: "🔮" }
    ];

    let pData = { b: 1000, inv: [], xp: 0, nick: "Новичок", av: "", numericId: 0 };
    let aClicks = 0;

    async function init() {
        auth.onAuthStateChanged(async (u) => {
            if (u) {
                document.getElementById('l-in').style.display = 'none';
                document.getElementById('l-out').style.display = 'block';
                await loadUser(u.uid);
            }
            upUI();
        });
        const s = document.getElementById('a-it');
        ITEMS.forEach((it, i) => s.innerHTML += `<option value="${i}">${it.i} ${it.n}</option>`);
    }

    async function loadUser(uid) {
        const doc = await db.collection("users").doc(uid).get();
        if (doc.exists) {
            pData = {...pData, ...doc.data()};
        } else {
            pData.numericId = await generateUniqueId();
            await db.collection("users").doc(uid).set(pData);
        }
        document.getElementById('h-id').innerText = `ID: ${pData.numericId}`;
    }

    async function generateUniqueId() {
        let id;
        let isUnique = false;
        while(!isUnique) {
            id = Math.floor(100000000 + Math.random() * 900000000);
            const snap = await db.collection("users").where("numericId", "==", id).get();
            if(snap.empty) isUnique = true;
        }
        return id;
    }

    async function sync() {
        upUI();
        if (auth.currentUser) await db.collection("users").doc(auth.currentUser.uid).update(pData);
    }

    function upUI() {
        document.getElementById('h-bal').innerText = pData.b.toLocaleString();
        document.getElementById('h-nick').innerText = pData.nick;
        if(pData.av) document.getElementById('h-av').src = pData.av;
        const lvl = Math.floor(Math.sqrt(pData.xp / 100)) + 1;
        document.getElementById('h-lvl').innerText = `Уровень: ${lvl} | Опыт: ${pData.xp}`;
        
        const g = document.getElementById('inv-grid');
        g.innerHTML = pData.inv.length ? '' : '<p style="grid-column:1/-1; opacity:0.3; text-align:center; padding-top:20px;">Инвентарь пуст</p>';
        pData.inv.forEach((it, i) => {
            g.innerHTML += `<div class="item-card">
                <div class="glow" style="background:var(--${it.r})"></div>
                <div style="font-size:45px; z-index:1;">${it.i}</div>
                <div style="font-size:12px; font-weight:bold; margin-top:8px; z-index:1;">${it.n}</div>
                <button class="nav-btn" style="margin-top:12px; font-size:10px; border:1px solid red; color:red; background:none; height:35px;" onclick="sl(${i})">Продать ${it.sell}</button>
            </div>`;
        });
    }

    function sl(i) { pData.b += pData.inv[i].sell; pData.inv.splice(i,1); sync(); }

    function shNick() { document.getElementById('m-n').style.display = 'flex'; }
    function clM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    
    async function svN() {
        const val = document.getElementById('n-in').value.trim();
        if(!val || !auth.currentUser) return;
        pData.nick = val;
        await db.collection("users").doc(auth.currentUser.uid).update({ nick: val });
        upUI(); clM(); ms("Ник успешно изменен!");
    }

    function aCl() {
        sw('settings', 't-s');
        aClicks++;
        if(aClicks >= 5) { document.getElementById('m-c').style.display = 'flex'; aClicks = 0; }
    }

    function chC() {
        if(document.getElementById('c-in').value === "duksnft_zxc1234zxc") {
            document.getElementById('a-box').style.display = 'block'; clM(); ms("Доступ получен");
        } else ms("Неверный код!");
    }

    async function gv(self) {
        const d = parseInt(document.getElementById('a-d').value || 0);
        const x = parseInt(document.getElementById('a-x').value || 0);
        const it = {...ITEMS[document.getElementById('a-it').value]};

        if(self) {
            pData.b += d; pData.xp += x; pData.inv.push(it); sync(); ms("Выдано себе");
        } else {
            const targetId = Number(document.getElementById('a-tid').value);
            if(!targetId) return ms("Введите корректный ID");
            
            const snap = await db.collection("users").where("numericId", "==", targetId).get();
            if(!snap.empty) {
                const targetDoc = snap.docs[0];
                const tData = targetDoc.data();
                const tInv = tData.inv || [];
                tInv.push(it);
                
                await db.collection("users").doc(targetDoc.id).update({
                    b: (tData.b || 0) + d,
                    xp: (tData.xp || 0) + x,
                    inv: tInv
                });
                ms("Успешно отправлено!");
            } else ms("Игрок с таким ID не найден");
        }
    }

    function ms(t) {
        const toast = document.getElementById('toast');
        toast.innerText = t; toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2500);
    }

    function tTh() {
        const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', t);
    }

    function sw(id, bid) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(bid).classList.add('active');
    }

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }
    function uAv(e) {
        const f = e.target.files[0];
        const r = new FileReader();
        r.onloadend = () => { pData.av = r.result; sync(); };
        if(f) r.readAsDataURL(f);
    }

    init();
</script>
</body>
</html>
