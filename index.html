<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DuksNFT - Economy Update</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #ffffff; --text: #1c1c1e; --header-bg: #f2f2f7;
            --nav-bg: #e5e5ea; --accent: #007aff; --card: #ffffff;
            --common: rgba(0, 122, 255, 0.4); --legendary: #ffcc00; 
            --mythic: #ff3b30; --exclusive: #af52de; --divine: #5856d6;
        }
        [data-theme="dark"] {
            --bg: #121212; --text: #ffffff; --header-bg: #1c1c1e; 
            --nav-bg: #2c2c2e; --accent: #0a84ff; --card: #252525;
        }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; -webkit-tap-highlight-color: transparent; user-select: none; }
        header { padding: 15px; background: var(--header-bg); border-bottom: 1px solid rgba(128,128,128,0.2); position: sticky; top: 0; z-index: 1000; }
        .balance { background: var(--accent); color: white; padding: 6px 14px; border-radius: 20px; font-weight: 800; }
        nav { display: flex; gap: 8px; margin-top: 10px; }
        .nav-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; background: var(--nav-bg); color: var(--text); font-weight: 700; font-size: 12px; cursor: pointer; }
        .nav-btn.active { background: var(--accent); color: white; }
        .screen { display: none; padding: 20px; text-align: center; }
        .screen.active { display: block; }
        .case-box { background: var(--card); padding: 25px; border-radius: 24px; margin-bottom: 20px; border: 1px solid rgba(128,128,128,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .open-button { width: 100%; padding: 16px; background: #34c759; color: white; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item { background: var(--card); padding: 15px; border-radius: 18px; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; min-height: 110px; justify-content: center; border: 1px solid rgba(128,128,128,0.1); }
        .glow { position: absolute; width: 60px; height: 60px; filter: blur(20px); border-radius: 50%; opacity: 0.5; z-index: 0; }
        .glow-rainbow { animation: rainbow 3s linear infinite; }
        @keyframes rainbow { 0% { background: red; } 33% { background: yellow; } 66% { background: blue; } 100% { background: red; } }
        .sell-btn { z-index: 2; margin-top: 10px; width: 100%; border: 1px solid #ff3b30; color: #ff3b30; background: transparent; padding: 6px; border-radius: 10px; font-size: 10px; font-weight: 800; }
        .admin-panel { display: none; background: #fff3cd; color: #856404; padding: 15px; border-radius: 15px; margin-top: 15px; text-align: left; border: 2px solid #ffeeba; }
        .admin-panel input, .admin-panel select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        #secret-input-box { display: none; background: var(--nav-bg); padding: 15px; border-radius: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-weight:900; font-size:22px; color:var(--accent);">DuksNFT</div>
        <div class="balance"><span id="b-val">0</span> D</div>
    </div>
    <nav>
        <button class="nav-btn active" id="btn-cases" onclick="show('cases', 'btn-cases')">Кейсы</button>
        <button class="nav-btn" id="btn-inv" onclick="show('inventory', 'btn-inv')">Инвентарь</button>
        <button class="nav-btn" id="btn-settings" onclick="handleSettingsClick()">⚙️</button>
    </nav>
</header>

<main>
    <div id="cases" class="screen active"></div>
    <div id="inventory" class="screen"><div class="grid" id="inv-g"></div></div>
    
    <div id="settings" class="screen">
        <h2 style="margin-bottom: 25px;">Настройки</h2>
        
        <div id="secret-input-box">
            <input type="password" id="secret-code-field" placeholder="Код админа">
            <button class="nav-btn" style="background:var(--accent); color:white; width:100%;" onclick="verifyAdminCode()">Войти</button>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid rgba(128,128,128,0.1);">
            <span>Тёмная тема</span>
            <input type="checkbox" id="theme-toggle" onchange="toggleTheme()" style="width:22px; height:22px;">
        </div>

        <div id="auth-info" style="background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(128,128,128,0.1);">
            <button class="nav-btn" style="background:#fff; color:#000; border:1px solid #ddd; width:100%;" onclick="loginWithGoogle()">Привязать Google</button>
        </div>
        <div id="user-profile" style="display:none; background: var(--card); padding: 20px; border-radius: 20px;">
            <p id="user-email" style="font-weight:bold;"></p>
            <button class="nav-btn" onclick="logout()" style="background:#ff3b30; color:white; width:100%;">Выйти</button>
        </div>

        <div id="admin-menu" class="admin-panel">
            <b>🛠 Админ-меню</b>
            <input type="number" id="adm-money-val" placeholder="Сумма Duks">
            <button class="nav-btn" onclick="addCustomMoney()">Выдать</button>
            <select id="adm-item-select"></select>
            <button class="nav-btn" onclick="addCustomItem()">Добавить предмет</button>
        </div>
    </div>
</main>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDno2jAXYzNc8EN3pkYbrhwkJ5v4aVBxH8",
        authDomain: "duksnft.firebaseapp.com",
        projectId: "duksnft",
        storageBucket: "duksnft.firebasestorage.app",
        messagingSenderId: "774746155070",
        appId: "1:774746155070:web:8e9718290ea579ffd8096f"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Список всех NFT в игре
    const ALL_ITEMS = [
        // Бедный
        { n: "Перо", sell: 150, c: "var(--common)", i: "🪶", chance: 33 },
        { n: "Урна", sell: 150, c: "var(--common)", i: "⚱️", chance: 33 },
        { n: "Старый ботинок", sell: 150, c: "var(--common)", i: "👞", chance: 33 },
        { n: "Золотой слиток", sell: 1000, c: "var(--legendary)", i: "🧈", chance: 1 },
        // Мощный
        { n: "Эспандер", sell: 1500, c: "var(--mythic)", i: "💪", chance: 50 },
        { n: "Золотой эспандер", sell: 2000, c: "var(--mythic)", i: "💪✨", chance: 20 },
        { n: "Алмазный эспандер", sell: 1500, c: "var(--mythic)", i: "💪💎", chance: 10 },
        { n: "Божественный эспандер", sell: 10000, c: "rainbow", i: "☄️", chance: 1 },
        // @#₽#37₽
        { n: "Золотой кубок", sell: 15000, c: "var(--legendary)", i: "🏆", chance: 5 },
        { n: "Золотая монета", sell: 800, c: "var(--legendary)", i: "🪙", chance: 25 },
        { n: "Мешок денег", sell: 5000, c: "var(--exclusive)", i: "💰", chance: 10 },
        { n: "Телефон", sell: 3000, c: "var(--divine)", i: "📱", chance: 15 },
        { n: "Сломанный телефон", sell: 200, c: "var(--common)", i: "🔌", chance: 25 },
        { n: "Кухонный нож", sell: 1200, c: "var(--mythic)", i: "🔪", chance: 20 }
    ];

    const CASES_DATA = [
        { name: "Бедный", price: 200, icon: "📦", items: [ALL_ITEMS[0], ALL_ITEMS[1], ALL_ITEMS[2], ALL_ITEMS[3]] },
        { name: "Мощный", price: 2000, icon: "⚡", items: [ALL_ITEMS[4], ALL_ITEMS[5], ALL_ITEMS[6], ALL_ITEMS[7]] },
        { name: "@#₽#37₽", price: 5000, icon: "🏷️", items: [ALL_ITEMS[8], ALL_ITEMS[9], ALL_ITEMS[10], ALL_ITEMS[11], ALL_ITEMS[12], ALL_ITEMS[13]] }
    ];

    let b = 1000; let inv = []; let adminClicks = 0;

    async function init() {
        if(localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('theme-toggle').checked = true;
        }
        const lb = localStorage.getItem('db');
        const li = localStorage.getItem('di');
        if(lb) b = parseInt(lb);
        if(li) inv = JSON.parse(li);

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('auth-info').style.display = 'none';
                document.getElementById('user-profile').style.display = 'block';
                document.getElementById('user-email').innerText = user.email;
                await loadCloud(user);
            }
            updateUI();
        });

        const sel = document.getElementById('adm-item-select');
        ALL_ITEMS.forEach((it, i) => sel.innerHTML += `<option value="${i}">${it.i} ${it.n}</option>`);
        renderCases();
        updateUI();
    }

    async function loadCloud(user) {
        const doc = await db.collection("users").doc(user.uid).get();
        if (doc.exists) {
            const data = doc.data();
            b = data.balance || 0;
            inv = data.inventory || [];
        }
    }

    function save() {
        localStorage.setItem('db', b);
        localStorage.setItem('di', JSON.stringify(inv));
        updateUI();
        if (auth.currentUser) db.collection("users").doc(auth.currentUser.uid).set({ balance: b, inventory: inv }, { merge: true });
    }

    function updateUI() {
        document.getElementById('b-val').innerText = b.toLocaleString();
        const g = document.getElementById('inv-g');
        g.innerHTML = inv.length ? '' : '<p style="grid-column:1/-1; opacity:0.5; margin-top:50px;">Пусто</p>';
        inv.forEach((it, i) => {
            const isR = it.c === 'rainbow';
            g.innerHTML += `<div class="item">
                <div class="glow ${isR ? 'glow-rainbow' : ''}" style="background:${isR ? '' : it.c}"></div>
                <div style="font-size:35px; z-index:1;">${it.i}</div>
                <button class="sell-btn" onclick="sell(${i})">${it.sell} D</button>
            </div>`;
        });
    }

    function renderCases() {
        document.getElementById('cases').innerHTML = CASES_DATA.map((c, i) => `
            <div class="case-box">
                <div style="font-size:50px;">${c.icon}</div>
                <h2 style="margin:10px 0;">${c.name}</h2>
                <button class="open-button" onclick="openC(${i})">${c.price} Duks</button>
            </div>`).join('');
    }

    function openC(caseIdx) {
        const c = CASES_DATA[caseIdx];
        if (b < c.price) return alert('Мало денег');
        b -= c.price;

        const pool = [];
        c.items.forEach(item => {
            for(let i=0; i < item.chance; i++) pool.push(item);
        });
        
        const win = pool[Math.floor(Math.random() * pool.length)];
        inv.push({...win});
        save();
    }

    function sell(i) { b += inv[i].sell; inv.splice(i, 1); save(); }
    function show(id, btnId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        if(btnId) document.getElementById(btnId).classList.add('active');
    }

    function toggleTheme() {
        const dark = document.getElementById('theme-toggle').checked;
        document.body.setAttribute('data-theme', dark ? 'dark' : 'light');
        localStorage.setItem('theme', dark ? 'dark' : 'light');
    }

    function handleSettingsClick() {
        show('settings', 'btn-settings');
        adminClicks++;
        if(adminClicks >= 5) {
            document.getElementById('secret-input-box').style.display = 'block';
            adminClicks = 0;
        }
    }

    function verifyAdminCode() {
        if(document.getElementById('secret-code-field').value === "Zxc1234Zxc") {
            document.getElementById('admin-menu').style.display = 'block';
            document.getElementById('secret-input-box').style.display = 'none';
        } else alert("Ошибка");
    }

    function addCustomMoney() { b += parseInt(document.getElementById('adm-money-val').value || 0); save(); }
    function addCustomItem() { inv.push({...ALL_ITEMS[document.getElementById('adm-item-select').value]}); save(); }
    function loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => { localStorage.clear(); location.reload(); }); }

    init();
</script>
</body>
</html>
