<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DuksNFT - ID & Odds Update</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #ffffff; --text: #1c1c1e; --accent: #007aff; --card: #f2f2f7;
            --common: #8e8e93; --epic: #af52de; --legendary: #ffcc00; --mythic: #ff3b30; --exclusive: #ff2d55; --divine: #5856d6;
        }
        [data-theme="dark"] { --bg: #121212; --text: #ffffff; --card: #1c1c1e; }
        
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        header { padding: 15px; background: var(--card); border-bottom: 1px solid rgba(128,128,128,0.2); position: sticky; top: 0; z-index: 1000; }
        
        .user-bar { display: flex; align-items: center; gap: 12px; }
        .avatar-box { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); overflow: hidden; background: #333; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .id-badge { font-size: 9px; opacity: 0.5; font-family: monospace; background: rgba(128,128,128,0.1); padding: 2px 5px; border-radius: 4px; display: inline-block; margin-top: 2px; }
        .balance-badge { background: var(--accent); color: white; padding: 6px 14px; border-radius: 20px; font-weight: 800; font-size: 13px; }
        
        nav { display: flex; gap: 5px; margin-top: 10px; }
        .nav-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; background: rgba(128,128,128,0.1); color: var(--text); font-weight: bold; font-size: 12px; cursor: pointer; }
        .nav-btn.active { background: var(--accent); color: white; }

        .screen { display: none; padding: 20px; }
        .screen.active { display: block; }

        .case-card { background: var(--card); padding: 20px; border-radius: 22px; margin-bottom: 15px; text-align: center; position: relative; border: 1px solid rgba(128,128,128,0.1); }
        .info-btn { position: absolute; top: 15px; right: 15px; background: rgba(128,128,128,0.2); border: none; border-radius: 50%; width: 25px; height: 25px; font-weight: bold; cursor: pointer; color: var(--text); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item-card { background: var(--card); border-radius: 18px; padding: 15px; position: relative; display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(128,128,128,0.1); overflow: hidden; }
        .glow { position: absolute; width: 60px; height: 60px; filter: blur(20px); border-radius: 50%; opacity: 0.4; z-index: 0; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
        .modal-body { background: var(--bg); padding: 25px; border-radius: 24px; width: 85%; max-width: 320px; text-align: center; max-height: 80vh; overflow-y: auto; }
        .modal input, .modal select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid rgba(128,128,128,0.3); background: var(--bg); color: var(--text); box-sizing: border-box; }

        .admin-panel { display: none; background: #fff3cd; color: #856404; padding: 15px; border-radius: 18px; margin-top: 15px; border: 2px solid #ffeeba; text-align: left; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 25px; display: none; z-index: 3000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .chance-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(128,128,128,0.1); font-size: 14px; }
    </style>
</head>
<body data-theme="light">

<header>
    <div class="user-bar">
        <div class="avatar-box" onclick="document.getElementById('f-in').click()">
            <img id="h-av" src="https://via.placeholder.com/50">
        </div>
        <input type="file" id="f-in" hidden accept="image/*" onchange="uAv(event)">
        <div style="flex:1">
            <div id="h-nick" style="font-weight:900; font-size:17px; color:var(--accent);" onclick="shNick()">Загрузка...</div>
            <div class="id-badge" id="h-id">ID: ?????</div>
        </div>
        <div class="balance-badge"><span id="h-bal">0</span> D</div>
    </div>
    <nav>
        <button class="nav-btn active" id="t-c" onclick="sw('cases', 't-c')">Кейсы</button>
        <button class="nav-btn" id="t-i" onclick="sw('inv', 't-i')">Сумка</button>
        <button class="nav-btn" id="t-s" onclick="aCl()">⚙️</button>
    </nav>
</header>

<main>
    <div id="cases" class="screen active"></div>
    <div id="inv" class="screen">
        <div id="h-lvl" style="text-align:center; margin-bottom:15px; font-weight:bold; font-size:12px; opacity:0.7;">Уровень: 1</div>
        <div class="grid" id="inv-grid"></div>
    </div>
    
    <div id="settings" class="screen">
        <h3>Настройки</h3>
        <button class="nav-btn" onclick="tTh()" style="width:100%; margin-bottom:10px; height:50px;">Сменить тему</button>
        <button class="nav-btn" id="l-in" onclick="login()" style="width:100%; background:white; color:black; border:1px solid #ddd;">Войти через Google</button>
        <button class="nav-btn" id="l-out" onclick="logout()" style="display:none; width:100%; background:#ff3b30; color:white;">Выйти</button>

        <div id="a-box" class="admin-panel">
            <b>🛠 АДМИН-ПАНЕЛЬ</b>
            <input type="number" id="a-d" placeholder="+ Деньги">
            <input type="number" id="a-x" placeholder="+ Опыт">
            <select id="a-it"></select>
            <button class="nav-btn" onclick="gv(true)" style="width:100%; background:#28a745; color:white; margin:5px 0;">Выдать себе</button>
            <hr style="border:0; border-top:1px solid #ffeeba; margin:10px 0;">
            <input type="text" id="a-tid" placeholder="Введите UID игрока">
            <button class="nav-btn" onclick="gv(false)" style="width:100%; background:#007aff; color:white;">Выдать по ID</button>
        </div>
    </div>
</main>

<div id="m-n" class="modal"><div class="modal-body">
    <h3>Смена ника</h3>
    <input type="text" id="n-in" maxlength="12" placeholder="Новый ник">
    <button class="nav-btn" style="background:var(--accent); color:white; width:100%;" onclick="svN()">Сохранить</button>
    <button class="nav-btn" style="width:100%; margin-top:8px;" onclick="clM()">Отмена</button>
</div></div>

<div id="m-info" class="modal"><div class="modal-body" id="info-body"></div></div>

<div id="m-c" class="modal"><div class="modal-body">
    <h3>Доступ разработчика</h3>
    <input type="password" id="c-in" placeholder="Введите код">
    <button class="nav-btn" style="background:var(--accent); color:white; width:100%;" onclick="chC()">Войти</button>
    <button class="nav-btn" style="width:100%; margin-top:8px;" onclick="clM()">Отмена</button>
</div></div>

<div id="toast" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDno2jAXYzNc8EN3pkYbrhwkJ5v4aVBxH8",
        authDomain: "duksnft.firebaseapp.com",
        projectId: "duksnft",
        storageBucket: "duksnft.firebasestorage.app",
        messagingSenderId: "774746155070",
        appId: "1:774746155070:web:8e9718290ea579ffd8096f"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ITEMS = [
        { n: "Обычное перо", sell: 150, r: "common", i: "🪶", ch: 50 },
        { n: "Старая урна", sell: 150, r: "common", i: "⚱️", ch: 40 },
        { n: "Слиток золота", sell: 1500, r: "legendary", i: "🧈", ch: 8 },
        { n: "Эспандер Богов", sell: 12000, r: "mythic", i: "💪☄️", ch: 2 },
        { n: "Корона Создателя", sell: 50000, r: "divine", i: "👑", ch: 0.1 }
    ];

    const CASES = [
        { name: "Обычный кейс", p: 200, icon: "📦", pool: [0, 1, 2] },
        { name: "Кейс Титана", p: 5000, icon: "💎", pool: [2, 3, 4] }
    ];

    let pData = { b: 1000, inv: [], xp: 0, nick: "Гость", av: "" };
    let clicks = 0;

    async function init() {
        auth.onAuthStateChanged(async (u) => {
            if (u) {
                document.getElementById('l-in').style.display = 'none';
                document.getElementById('l-out').style.display = 'block';
                document.getElementById('h-id').innerText = `ID: ${u.uid.substring(0,10)}...`;
                document.getElementById('h-id').onclick = () => { navigator.clipboard.writeText(u.uid); ms("ID скопирован!"); };
                
                const d = await db.collection("users").doc(u.uid).get();
                if (d.exists) pData = {...pData, ...d.data()};
                else await db.collection("users").doc(u.uid).set(pData);
            }
            upUI();
        });
        const s = document.getElementById('a-it');
        ITEMS.forEach((it, i) => s.innerHTML += `<option value="${i}">${it.i} ${it.n}</option>`);
        rnCs();
    }

    async function sync() {
        upUI();
        if (auth.currentUser) await db.collection("users").doc(auth.currentUser.uid).set(pData, { merge: true });
    }

    function upUI() {
        document.getElementById('h-bal').innerText = pData.b.toLocaleString();
        document.getElementById('h-nick').innerText = pData.nick;
        if(pData.av) document.getElementById('h-av').src = pData.av;
        const lvl = Math.floor(Math.sqrt(pData.xp / 100)) + 1;
        document.getElementById('h-lvl').innerText = `Уровень: ${lvl} | Опыт: ${pData.xp}`;
        
        const g = document.getElementById('inv-grid');
        g.innerHTML = pData.inv.length ? '' : '<p style="grid-column:1/-1; opacity:0.3; text-align:center; padding:20px;">Тут пока ничего нет...</p>';
        pData.inv.forEach((it, i) => {
            g.innerHTML += `<div class="item-card">
                <div class="glow" style="background:var(--${it.r})"></div>
                <div style="font-size:35px; z-index:1;">${it.i}</div>
                <div style="font-size:10px; font-weight:bold; margin-top:5px; z-index:1;">${it.n}</div>
                <button class="nav-btn" style="margin-top:10px; font-size:9px; border:1px solid red; color:red; background:none; padding:5px 10px;" onclick="sl(${i})">Продать ${it.sell}</button>
            </div>`;
        });
    }

    function rnCs() {
        document.getElementById('cases').innerHTML = CASES.map((c, i) => `
            <div class="case-card">
                <button class="info-btn" onclick="shInfo(${i})">?</button>
                <span style="font-size:55px; display:inline-block;" id="ico-${i}">${c.icon}</span>
                <h3 style="margin:10px 0;">${c.name}</h3>
                <button class="nav-btn" style="background:#34c759; color:white; width:100%;" onclick="opC(${i})">${c.p} Duks</button>
            </div>`).join('');
    }

    function shInfo(i) {
        const c = CASES[i];
        let h = `<h3>Состав: ${c.name}</h3><div style="text-align:left;">`;
        c.pool.forEach(idx => {
            const it = ITEMS[idx];
            h += `<div class="chance-item">
                <span>${it.i} ${it.n}</span>
                <span style="color:var(--${it.r}); font-weight:bold;">${it.ch}%</span>
            </div>`;
        });
        h += `</div><button class="nav-btn" style="width:100%; margin-top:15px;" onclick="clM()">Закрыть</button>`;
        document.getElementById('info-body').innerHTML = h;
        document.getElementById('m-info').style.display = 'flex';
    }

    function opC(i) {
        if (pData.b < CASES[i].p) return ms("Мало денег!");
        pData.b -= CASES[i].p;
        sync(); 
        document.getElementById(`ico-${i}`).animate([{transform:'scale(1)'},{transform:'scale(1.2)'},{transform:'scale(1)'}], 300);
        setTimeout(() => {
            const roll = Math.random() * 100;
            let current = 0;
            let win = ITEMS[CASES[i].pool[0]];
            for(let idx of CASES[i].pool) {
                current += ITEMS[idx].ch;
                if(roll <= current) { win = {...ITEMS[idx]}; break; }
            }
            pData.inv.push(win); pData.xp += 25;
            sync(); ms("Выпало: " + win.n);
        }, 300);
    }

    function sl(i) { pData.b += pData.inv[i].sell; pData.inv.splice(i,1); sync(); }

    function shNick() { document.getElementById('m-n').style.display = 'flex'; }
    function clM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    
    async function svN() {
        const val = document.getElementById('n-in').value.trim();
        if(!val || !auth.currentUser) return;
        pData.nick = val;
        await db.collection("users").doc(auth.currentUser.uid).update({ nick: val });
        upUI(); clM(); ms("Ник изменен!");
    }

    function aCl() {
        sw('settings', 't-s');
        clicks++;
        if(clicks >= 5) { document.getElementById('m-c').style.display = 'flex'; clicks = 0; }
    }

    function chC() {
        if(document.getElementById('c-in').value === "DuksNFT_Zxc1234Zxc") {
            document.getElementById('a-box').style.display = 'block'; clM(); ms("Доступ получен");
        } else ms("Неверно!");
    }

    async function gv(self) {
        const d = parseInt(document.getElementById('a-d').value || 0);
        const x = parseInt(document.getElementById('a-x').value || 0);
        const it = {...ITEMS[document.getElementById('a-it').value]};

        if(self) {
            pData.b += d; pData.xp += x; pData.inv.push(it); sync(); ms("Выдано себе");
        } else {
            const tid = document.getElementById('a-tid').value.trim();
            if(!tid) return ms("Введите ID!");
            try {
                const doc = await db.collection("users").doc(tid).get();
                if(doc.exists) {
                    const data = doc.data();
                    const newInv = data.inv || [];
                    newInv.push(it);
                    await db.collection("users").doc(tid).update({
                        b: (data.b || 0) + d,
                        xp: (data.xp || 0) + x,
                        inv: newInv
                    });
                    ms("Отправлено игроку!");
                } else ms("ID не найден");
            } catch(e) { ms("Ошибка ID"); }
        }
    }

    function ms(t) {
        const toast = document.getElementById('toast');
        toast.innerText = t; toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    function tTh() {
        const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', t);
        localStorage.setItem('game-theme', t);
    }

    function sw(id, bid) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(bid).classList.add('active');
    }

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }
    function uAv(e) {
        const f = e.target.files[0];
        const r = new FileReader();
        r.onloadend = () => { pData.av = r.result; sync(); };
        if(f) r.readAsDataURL(f);
    }

    init();
</script>
</body>
</html>
